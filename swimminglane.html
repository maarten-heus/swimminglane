<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Zwembad Game</title>
  <style>
    body {
      margin: 0;
      background: #1a5c1a;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
      margin: 0 auto;
      /* desktop: max de echte breedte */
      width: min(100vw, 720px);
      height: auto;
      touch-action: manipulation;
    }

    /* ✅ touch-knoppen: alleen zichtbaar op touch-apparaten */
    #touch-controls {
      display: none;
      flex-direction: column;
      gap: 6px;
      padding: 6px 8px env(safe-area-inset-bottom, 12px);
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
      background: #111;
      user-select: none;
      -webkit-user-select: none;
    }

    .touch-row {
      display: flex;
      gap: 6px;
      width: 100%;
    }

    #touch-controls button {
      font: bold 18px monospace;
      padding: 12px 0;
      background: #2a2a2a;
      color: white;
      border: 2px solid #555;
      border-radius: 10px;
      touch-action: manipulation;
      flex: 1;
    }

    /* ◀ en ▶ bij de duimen */
    .btn-nav  { flex: 1.2; font-size: 24px; }

    /* DUIK/START in het midden, tussen de pijltjes */
    .btn-dive { flex: 2; font-size: 15px; letter-spacing: 1px;
                background: #003C8F; border-color: #4FC3F7; }

    /* geheime knop: ziet er gewoon uit (easter egg) */
    .btn-secret { background: #2a2a2a; border-color: #555; font-size: 14px; color: #666; }

    #touch-controls button:active {
      background: #4FC3F7;
      color: black;
      border-color: #fff;
    }
    .btn-dive:active { background: #1565C0; color: white; }

    @media (hover: none), (pointer: coarse) {
      body {
        /* alles in één kolom, overflow verbergt de lege ruimte eronder */
        height: 100dvh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: #111;
      }

      canvas {
        /* schaal canvas zodat canvas + ~145px knoppen precies passen */
        width: min(100vw, 720px, calc((100dvh - 145px) * 0.72));
        flex-shrink: 0;
      }

      #touch-controls {
        display: flex;
        flex: 1;
        justify-content: flex-end;
        width: 100%;
        max-width: 100vw;
        margin: 0;
        /* ruimte voor home-bar op notch-telefoons */
        padding-bottom: max(env(safe-area-inset-bottom, 0px), 6px);
      }
    }
  </style>
</head>
<body>

<canvas id="game" width="720" height="1000"></canvas>

<!-- ✅ touch-besturing voor mobiel (vuurt dezelfde toets-events af) -->
<div id="touch-controls">
  <!-- rij 1: snelheid + Ball Twist -->
  <div class="touch-row">
    <button data-key="ArrowDown" aria-label="langzamer">Langzamer</button>
    <button data-key="KeyB"      aria-label="speciaal" class="btn-secret">•••</button>
    <button data-key="ArrowUp"   aria-label="sneller">Sneller</button>
  </div>
  <!-- rij 2: ◀  DUIK/START  ▶ -->
  <div class="touch-row">
    <button data-key="ArrowLeft"  aria-label="baan naar links"  class="btn-nav">◀</button>
    <button data-key="Space"      aria-label="start / duik"     class="btn-dive">DUIK / START</button>
    <button data-key="ArrowRight" aria-label="baan naar rechts" class="btn-nav">▶</button>
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// =====================================================
// SCENE CONFIG
// =====================================================

const POOL_X = 60;
const POOL_Y = 90;
const POOL_WIDTH = 400;
const POOL_HEIGHT = 480;

const HUD_X = 500;

const LANE_COUNT = 4;
const LANE_WIDTH = 100;

const SWIMMER_SIZE = 22;
const PLAYER_SIZE = 22;

// ✅ speler heeft een eigen kleur (rood + gele rand) zodat hij niet
// verward wordt met de blauwe "langzamer"-zwemmers
const PLAYER_COLOR = "#E53935";

const DECK_MARGIN = 34;

const MAX_DIVES_PER_LEVEL = 3;
const DIVE_DURATION = 55;

const SWIMMER_PENALTY_DURATION = 180;
const PAIR_COLLISION_LIMIT = 2;
const PAIR_COLLISION_COOLDOWN = 50;

const LANES_PER_LEVEL = 5;
const MAX_LEVEL = 10;

const GATE = {
  x: 660,
  y: 390
};

const CABIN_X     = GATE.x - 130; // = 530, linker rand kleedhokjes
const CABIN_Y     = GATE.y - 75;  // = 315, bovenkant kleedhokjes
const CABIN_W     = 80;
const CABIN_H     = 60;
const CABIN_COUNT = 3;

// handdoek-plekken op het gras (rechts van het dek, x > 514)
const TOWEL_SPOTS = [
  { x: 527, y: 358 }, { x: 560, y: 353 }, { x: 601, y: 360 }, { x: 639, y: 355 },
  { x: 525, y: 421 }, { x: 561, y: 427 }, { x: 600, y: 419 }, { x: 640, y: 424 }
];
const TOWEL_COLORS = ["#FF6B6B", "#FFD93D", "#6BCB77", "#4D96FF", "#FF922B", "#CC5DE8"];

const RIGHT_WALKWAY_X = POOL_X + POOL_WIDTH + DECK_MARGIN;
const TOP_WALKWAY_Y = POOL_Y - DECK_MARGIN;
const BOTTOM_WALKWAY_Y = POOL_Y + POOL_HEIGHT + DECK_MARGIN;

const LADDERS = [
  // BOVEN (korte zijde)
  { name: "boven links", side: "top", x: POOL_X + 20, y: POOL_Y - 8 },
  { name: "boven rechts", side: "top", x: POOL_X + POOL_WIDTH - 20, y: POOL_Y - 8 },

  // ONDER (korte zijde)
  { name: "onder links", side: "bottom", x: POOL_X + 20, y: POOL_Y + POOL_HEIGHT + 8 },
  { name: "onder rechts", side: "bottom", x: POOL_X + POOL_WIDTH - 20, y: POOL_Y + POOL_HEIGHT + 8 }
];

// =====================================================
// DYNAMIC SUBLANE CONFIG
// =====================================================

function getSubLanesPerLane() {
  return 3;
}

function getSubLaneWidth() {
  return LANE_WIDTH / getSubLanesPerLane();
}

function getTotalSubLanes() {
  return LANE_COUNT * getSubLanesPerLane();
}

// =====================================================
// GAME STATE
// =====================================================

let swimmers = [];

let lanesCompleted = 0;
let lanesThisLevel = 0;

let hits = 0;
let maxHits = 5;
let timeLeft = 90;
let hitCooldown = 0;

let level = 0; // level 0 = uitleg/introbaan

let nextSwimmerId = 1;
let pairCollisionCounts = {};
let pairCollisionCooldowns = {};

let overlay = null;
let gamePaused = false;
let gameFinished = false;

// bij het begin van een level komen de eerste zwemmers van het nieuwe type binnen
let forcedNewType = null;
let forcedNewTypeCount = 0;

// botsings-effect (stofwolk met vuisten)
let fightClouds = [];

// "Russian Ball Twist": 1x per hele game bruikbaar, geheim: 3× dezelfde knop
let russianBallTwistUsed = false;
let bPressCount = 0;
let bPressTimer = 0;

// handdoeken die zwemmers op het gras hebben neergelegd
let towels = [];

// =====================================================
// AGENT MODE (aansturing door een Claude-playtester)
// =====================================================
let agentMode = false;
let agentFrameCount = 0;
let agentMetrics = {
  playerHits: 0,
  swimmerCollisions: 0, // botsingen tussen zwemmers onderling (niet de speler)
  linePenalties: 0,     // zachte straffen voor lijn-oversteken zonder duik
  ballTwistUsed: false,
  levelsCleared: [],
  events: []
};

function logAgentEvent(type, data) {
  if (agentMetrics.events.length > 500) return;
  agentMetrics.events.push(Object.assign({ frame: agentFrameCount, level, type }, data || {}));
}

// =====================================================
// OVERLAY / LEVEL SYSTEM
// =====================================================

function showOverlay(text, durationFrames, onDone) {
  overlay = {
    text,
    timer: durationFrames,
    duration: durationFrames,
    onDone
  };
  gamePaused = true;
}

function updateOverlay() {
  if (!overlay) return;

  overlay.timer--;

  if (overlay.timer <= 0) {
    const done = overlay.onDone;
    overlay = null;

    if (done) {
      done();
    }
  }
}

function resetForNextLevel(oldSubLaneCount, newSubLaneCount) {
  lanesThisLevel = 0;
  hits = 0;
  hitCooldown = 0;
  timeLeft = 90;
  towels = [];

  player.penaltyTimer = 0;
  player.color = PLAYER_COLOR;
  // ✅ eindbaas: onbeperkt duiken; anders normaal aantal
  player.divesLeft = (level >= MAX_LEVEL) ? 999 : MAX_DIVES_PER_LEVEL;
  player.isDiving = false;
  player.diveTimer = 0;

  // ✅ speler begint weer op de rand van het bad
  player.swimming = false;
  player.speedY = 0;
  player.y = POOL_Y - 22;

  player.globalSubLane = globalSubLaneFromLaneAndSub(
    2,
    Math.floor(getSubLanesPerLane() / 2)
  );
  player.x = xForGlobalSubLane(player.globalSubLane);

  // ✅ eindbaas-level: leeg bad, duikerslinie wordt apart gespawnd
  if (level >= MAX_LEVEL) {
    swimmers = [];
    pairCollisionCounts = {};
    pairCollisionCooldowns = {};
    return;
  }

  swimmers.forEach(s => {
  s.penaltyTimer = 0;
  s.avoiding = false;
  s.stopped = false;
  s.stopTimer = 0;

  // ✅ NIEUW: reset zwemdoel
  s.lanesSwum = 0;

  const type = s.type;
  s.targetLanes =
    type.lanesMin +
    Math.floor(Math.random() * (type.lanesMax - type.lanesMin + 1));

  s.markedForExit = false;
});

  pairCollisionCounts = {};
  pairCollisionCooldowns = {};

  if (oldSubLaneCount !== newSubLaneCount) {
    populateInitialSwimmers();
  }
}

// de introbaan (level 0) is korter dan de echte levels
function getLanesTarget() {
  return level === 0 ? 3 : LANES_PER_LEVEL;
}

function checkLevelProgress() {
  if (gameFinished) return;
  if (overlay) return;
  if (lanesThisLevel < getLanesTarget()) return;

  const clearedLevel = level;
  const oldSubLaneCount = getSubLanesPerLane();

  const clearedText =
    clearedLevel === 0 ? "INTRO GEHAALD" : "LEVEL " + clearedLevel + " GEHAALD";

  agentMetrics.levelsCleared.push({ level: clearedLevel, timeLeft, frame: agentFrameCount });
  logAgentEvent("levelCleared", { clearedLevel, timeLeft });

  showOverlay(clearedText, 130, () => {
    if (clearedLevel >= MAX_LEVEL) {
      gameFinished = true;
      overlay = {
        text: "GOED GEZWOMMEN!",
        timer: 999999,
        duration: 999999,
        onDone: null
      };
      gamePaused = true;
      return;
    }

    level++;

    const newSubLaneCount = getSubLanesPerLane();

    resetForNextLevel(oldSubLaneCount, newSubLaneCount);

    // ✅ introduceer het nieuwe level met uitleg + plaatje
    showLevelIntro(level);
  });
}

// =====================================================
// LEVEL INTRO OVERLAYS
// =====================================================

const LEVEL_INTROS = {
  0:  {
        title: "OEFENBAAN",
        duration: 900,
        lines: [
          "Even oefenen — nog geen andere zwemmers",
          "",
          "←  →     wissel van baan",
          "↑ sneller       ↓ langzamer",
          "SPATIE   springen in het water",
          "",
          "Duik (SPATIE) om een witte lijn",
          "over te steken — anders word je afgeremd!",
          "Elke voltooide baan geeft 1 duik terug",
          "",
          "Zwem 3 baantjes   ( SPATIE = start )"
        ]
      },
  1:  { title: "LEVEL 1",  typeName: "ordinary",        lines: ["Gewone zwemmers", "Net zo snel als jij"] },
  2:  { title: "LEVEL 2",  typeName: "slower",          lines: ["Langzamere zwemmer", "Houd rekening met tempo"] },
  3:  { title: "LEVEL 3",  typeName: "faster",          lines: ["Snellere zwemmer", "Iets sneller dan jij"] },
  4:  { title: "LEVEL 4",  typeName: "elderlySingle",   lines: ["Bejaarde zwemmer", "Heel langzaam — geef voorrang!"] },
  5:  { title: "LEVEL 5",  typeName: "friendlyCrawl",   lines: ["Vriendelijke borstcrawl", "Snel, maar wijkt netjes uit"] },
  6:  { title: "LEVEL 6",  typeName: "elderlyGroup",    lines: ["Groep bejaarden", "Langzaam en lekker breed"] },
  7:  { title: "LEVEL 7",  typeName: "unfriendlyCrawl", lines: ["Onvriendelijke borstcrawl", "Snel en let NIET op!"] },
  8:  { title: "LEVEL 8",  typeName: "bomb",            lines: ["BOMMETJE!", "Kind springt van de kant"] },
  9:  { title: "LEVEL 9",  typeName: "raft",            lines: ["Kinderen op een vlot", "Drijft alle kanten op (max 2)"] },
  10: { title: "EINDBAAS", typeName: "boss",            lines: ["Linie van duikers!", "DUIK eronderdoor met SPACE"] }
};

// het type dat in dit level nieuw geïntroduceerd wordt
function getNewTypeForLevel(lvl) {
  const arr = TYPE_UNLOCKS[lvl];
  if (!arr || arr.length === 0) return null;
  return arr[arr.length - 1];
}

// laat de eerste 2 binnenkomende zwemmers van het nieuwe type zijn
function spawnIntroSwimmers(lvl) {
  const t = getNewTypeForLevel(lvl);
  if (!t || t === "boss") return;

  forcedNewType = t;
  forcedNewTypeCount = 2;

  swimmers.push(createSwimmer(false));
  swimmers.push(createSwimmer(false));
}

function showLevelIntro(lvl) {
  const intro = LEVEL_INTROS[lvl];

  if (!intro) {
    gamePaused = false;
    spawnIntroSwimmers(lvl);
    return;
  }

  const dur = intro.duration || 230;

  overlay = {
    text: intro.title,
    lines: intro.lines,
    typeName: intro.typeName,
    timer: dur,
    duration: dur,
    onDone: () => {
      gamePaused = false;

      if (lvl >= MAX_LEVEL) {
        // ✅ eindbaas: spawn de duikerslinie zodra het spel begint
        spawnBossLine();
      } else {
        // ✅ eerst 2 zwemmers van het nieuwe type, daarna pas willekeurig
        spawnIntroSwimmers(lvl);
      }
    }
  };

  gamePaused = true;
}

// =====================================================
// LEVEL CONFIG
// =====================================================

function getLevelConfig(level) {
  // introbaan: puur oefenen, geen andere zwemmers
  if (level === 0) {
    return { maxSwimmers: 0, startSwimmers: 0 };
  }

  // ✅ zachte moeilijkheidscurve: L1=4, L2=6, L3=8 ... max 16
  // (12 subbanen totaal bij 4 lanes × 3 subbanen)
  const maxSwimmers = Math.min(2 + 2 * level, 16);
  const startSwimmers = Math.max(2, maxSwimmers - 2);

  return { maxSwimmers, startSwimmers };
}

function getMaxSwimmers() {
  return getLevelConfig(level).maxSwimmers;
}

function getStartSwimmers() {
  return getLevelConfig(level).startSwimmers;
}

// =====================================================
// SPEED SCALE
// =====================================================

function speedFromScale(min, max) {
  const value = min + Math.random() * (max - min);
  return value * 0.08;
}

// =====================================================
// GRID HELPERS
// =====================================================

function laneFromGlobalSubLane(globalSubLane) {
  return Math.floor(Math.round(globalSubLane) / getSubLanesPerLane());
}

function subLaneInsideLane(globalSubLane) {
  return Math.round(globalSubLane) % getSubLanesPerLane();
}

function globalSubLaneFromLaneAndSub(lane, subLane) {
  return lane * getSubLanesPerLane() + subLane;
}

function xForGlobalSubLane(globalSubLane) {
  return POOL_X
    + Math.round(globalSubLane) * getSubLaneWidth()
    + getSubLaneWidth() / 2
    - PLAYER_SIZE / 2;
}

function xForSwimmerGlobalSubLane(globalSubLane) {
  return POOL_X
    + Math.round(globalSubLane) * getSubLaneWidth()
    + getSubLaneWidth() / 2
    - SWIMMER_SIZE / 2;
}

function randomGlobalSubLaneInLane(lane) {
  return globalSubLaneFromLaneAndSub(
    lane,
    Math.floor(Math.random() * getSubLanesPerLane())
  );
}

function randomElderlyStartSubLaneInLane(lane) {
  const maxStart = Math.max(0, getSubLanesPerLane() - 2);
  const sub = Math.floor(Math.random() * (maxStart + 1));
  return globalSubLaneFromLaneAndSub(lane, sub);
}

function crossesMainLaneBoundary(fromGlobalSubLane, toGlobalSubLane) {
  return laneFromGlobalSubLane(fromGlobalSubLane) !== laneFromGlobalSubLane(toGlobalSubLane);
}

// =====================================================
// PLAYER
// =====================================================

let player = {
  globalSubLane: globalSubLaneFromLaneAndSub(2, 1),

  x: xForGlobalSubLane(globalSubLaneFromLaneAndSub(2, 1)),
  y: POOL_Y - 22, // ✅ boven water (op rand)
  speedY: 0,

  baseSpeed: 2.0,
  maxSpeed: 3.0,
  minSpeed: 0.8,

  // ✅ gekozen kruissnelheid (↑/↓): blijft behouden, ook na een straf
  cruiseSpeed: 2.0,

  swimming: false,
  color: PLAYER_COLOR,

  penaltyTimer: 0,
  penaltyDuration: 180,

  divesLeft: MAX_DIVES_PER_LEVEL,
  isDiving: false,
  diveTimer: 0
};

// =====================================================
// BASIC HELPERS
// =====================================================

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function randomFromArray(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

// bejaarden (alleen of in groep) hebben altijd voorrang
function hasElderlyPriority(s) {
  return s.typeName === "elderlyGroup" || s.typeName === "elderlySingle";
}

const ACTIVE_POOL_STATES = new Set([
  "swimming",
  "walkingIn",
  "waitingToJump",
  "goingToLadderToEnter",
  "enteringByLadder",
  "goingToCabin",
  "inCabin",
  "goingToTowelSpot",
  "layingTowel"
]);

function isPoolActiveSwimmer(s) {
  return ACTIVE_POOL_STATES.has(s.state);
}

function getActiveSwimmers() {
  return swimmers.filter(isPoolActiveSwimmer);
}

function getLaneSwimmers(lane) {
  return swimmers.filter(s => s.lane === lane && isPoolActiveSwimmer(s));
}

function getLaneStats(lane) {
  const laneSwimmers = getLaneSwimmers(lane);

  if (laneSwimmers.length === 0) {
    return { population: 0, avgSpeed: 0, aggression: 0 };
  }

  const sum = laneSwimmers.reduce((acc, s) => acc + Math.abs(s.normalSpeed), 0);

  return {
    population: laneSwimmers.length,
    avgSpeed: sum / laneSwimmers.length,
    aggression: laneSwimmers.filter(s => s.typeName === "unfriendlyCrawl").length
  };
}

function moveTowards(obj, targetX, targetY, speed) {
  const dx = targetX - obj.x;
  const dy = targetY - obj.y;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist <= speed || dist === 0) {
    obj.x = targetX;
    obj.y = targetY;
    return true;
  }

  obj.x += (dx / dist) * speed;
  obj.y += (dy / dist) * speed;

  return false;
}

function verticalOverlap(aY, aH, bY, bH) {
  return (
    aY < bY + bH &&
    aY + aH > bY
  );
}


function isAhead(swimmer, other) {
  if (swimmer.speedY > 0) {
    return other.y > swimmer.y;
  } else {
    return other.y < swimmer.y;
  }
}


function shouldAvoid(s, o) {


  // =========================
  // ✅ 0. Bejaarden hebben voorrang
  // =========================

  if (hasElderlyPriority(o) && !hasElderlyPriority(s)) {
    return true; // jij wijkt uit
  }

  if (hasElderlyPriority(s) && !hasElderlyPriority(o)) {
    return false; // bejaarde blijft
  }


  // =========================
  // 1. Zelfde zwemrichting
  // =========================
  if (Math.sign(s.speedY) === Math.sign(o.speedY)) {

    // s zit achter o → s moet uitwijken
    return isAhead(s, o);
  }

  // =========================
  // 2. Tegengestelde richting (frontaal)
  // =========================

  // 👉 kies 1 swimmer die moet wijken
  // stabiel: degene met lagere id wijkt uit
  if (s.id < o.id) {
    return true;
  } else {
    return false;
  }
}



function forwardDistance(swimmer, other) {
  return Math.abs(other.y - swimmer.y);
}

function pairKey(a, b) {
  const first = Math.min(a.id, b.id);
  const second = Math.max(a.id, b.id);
  return first + "-" + second;
}

// =====================================================
// LOGICAL COLLISION / OCCUPANCY
// =====================================================

function getGroupMemberOffsets(s) {
  const forward = s.speedY >= 0 ? 1 : -1;

  if (s.groupSize === 2) {
    return [
      { subOffset: 0, y: 0 },
      { subOffset: 1, y: 0 }
    ];
  }

  return [
    { subOffset: 0, y: 0 },
    { subOffset: 1, y: 0 },
    { subOffset: 0, y: -forward * 24 }
  ];
}

function getLogicalSwimmerParts(s) {
  if (s.typeName !== "elderlyGroup") {
    return [
      {
        globalSubLane: Math.round(s.globalSubLane),
        y: s.y,
        h: SWIMMER_SIZE
      }
    ];
  }

  if (s.state !== "swimming") {
    return [
      {
        globalSubLane: Math.round(s.globalSubLane),
        y: s.y,
        h: SWIMMER_SIZE
      }
    ];
  }

  const offsets = getGroupMemberOffsets(s);

  return offsets.map(o => {
    return {
      globalSubLane: Math.round(s.globalSubLane + o.subOffset),
      y: s.y + o.y,
      h: SWIMMER_SIZE
    };
  });
}

function swimmersShareLogicalSubLane(a, b) {
  const aParts = getLogicalSwimmerParts(a);
  const bParts = getLogicalSwimmerParts(b);

  for (const ap of aParts) {
    for (const bp of bParts) {
      if (ap.globalSubLane === bp.globalSubLane) {
        return true;
      }
    }
  }

  return false;
}

function swimmersCollideLogical(a, b) {
  const aParts = getLogicalSwimmerParts(a);
  const bParts = getLogicalSwimmerParts(b);

  for (const ap of aParts) {
    for (const bp of bParts) {
      if (ap.globalSubLane !== bp.globalSubLane) continue;

      if (verticalOverlap(ap.y, ap.h, bp.y, bp.h)) {
        return true;
      }
    }
  }

  return false;
}

function playerCollidesWithSwimmerLogical(player, swimmer) {
  const playerSubLane = Math.round(player.globalSubLane);
  const parts = getLogicalSwimmerParts(swimmer);

  for (const part of parts) {
    if (part.globalSubLane !== playerSubLane) continue;

    if (verticalOverlap(player.y, PLAYER_SIZE, part.y, part.h)) {
      return true;
    }
  }

  return false;
}

function chooseAdjacentGlobalSubLane(s) {
  const options = [];

  const currentSubLane = Math.round(s.globalSubLane);
  const inside = subLaneInsideLane(currentSubLane);
  const lane = s.lane;

  if (inside > 0) {
    options.push(globalSubLaneFromLaneAndSub(lane, inside - 1));
  }

  if (inside < getSubLanesPerLane() - 1) {
    options.push(globalSubLaneFromLaneAndSub(lane, inside + 1));
  }

  if (options.length === 0) return currentSubLane;

  return randomFromArray(options);
}

// =====================================================
// SMART SUBLANE SELECTION AFTER REPEATED COLLISIONS
// =====================================================

function countSwimmersInGlobalSubLane(globalSubLane, ignoreSwimmer) {
  let count = 0;

  swimmers.forEach(s => {
    if (s === ignoreSwimmer) return;
    if (s.state !== "swimming") return;

    const parts = getLogicalSwimmerParts(s);

    parts.forEach(part => {
      if (part.globalSubLane === globalSubLane) {
        count++;
      }
    });
  });

  return count;
}

function chooseLeastCrowdedSubLaneForSwimmer(s) {
  const lane = s.lane;

  if (s.typeName === "elderlyGroup") {
    const candidates = [];

    for (let sub = 0; sub < getSubLanesPerLane() - 1; sub++) {
      const g1 = globalSubLaneFromLaneAndSub(lane, sub);
      const g2 = globalSubLaneFromLaneAndSub(lane, sub + 1);

      candidates.push({
        globalSubLane: g1,
        count: countSwimmersInGlobalSubLane(g1, s) + countSwimmersInGlobalSubLane(g2, s)
      });
    }

    candidates.sort((a, b) => {
      if (a.count !== b.count) return a.count - b.count;
      return Math.random() - 0.5;
    });

    return candidates[0].globalSubLane;
  }

  const candidates = [];

  for (let sub = 0; sub < getSubLanesPerLane(); sub++) {
    const g = globalSubLaneFromLaneAndSub(lane, sub);

    candidates.push({
      globalSubLane: g,
      count: countSwimmersInGlobalSubLane(g, s)
    });
  }

  candidates.sort((a, b) => {
    if (a.count !== b.count) return a.count - b.count;
    return Math.random() - 0.5;
  });

  return candidates[0].globalSubLane;
}

function chooseSwimmerToMoveAfterRepeatedCollision(a, b) {
  if (a.typeName === "elderlyGroup" && b.typeName !== "elderlyGroup") return b;
  if (b.typeName === "elderlyGroup" && a.typeName !== "elderlyGroup") return a;

  if (a.typeName === "unfriendlyCrawl" && b.typeName !== "unfriendlyCrawl") return b;
  if (b.typeName === "unfriendlyCrawl" && a.typeName !== "unfriendlyCrawl") return a;

  return Math.random() < 0.5 ? a : b;
}

function forceSwimmerToLeastCrowdedSubLane(s) {
  const newGlobalSubLane = chooseLeastCrowdedSubLaneForSwimmer(s);

  s.targetGlobalSubLane = newGlobalSubLane;
  s.originalGlobalSubLane = newGlobalSubLane;

  if (s.typeName === "elderlyGroup") {
    s.globalSubLane = newGlobalSubLane;
    s.x = xForSwimmerGlobalSubLane(s.globalSubLane);
  } else {
    s.avoiding = true;
    s.avoidTimer = 140;
    s.returnToLane = false;
  }
}

// =====================================================
// DIVE LOGIC
// =====================================================

function startDive() {
  if (!player.swimming) return;
  if (player.isDiving) return;
  if (player.divesLeft <= 0) return;
  if (player.penaltyTimer > 0) return;

  player.isDiving = true;
  player.diveTimer = DIVE_DURATION;
  player.divesLeft--;
}

function updateDive() {
  if (!player.isDiving) return;

  player.diveTimer--;

  if (player.diveTimer <= 0) {
    player.isDiving = false;
  }
}

// =====================================================
// RUSSIAN BALL TWIST (eenmalige special move)
// =====================================================

// vind de dichtstbijzijnde zwemmers bij een dreigende botsing (max maxCount)
function findBallTwistTargets(maxCount) {
  const pSub = Math.round(player.globalSubLane);
  const pcy = player.y + PLAYER_SIZE / 2;

  const found = [];

  swimmers.forEach(s => {
    if (s.state !== "swimming") return;
    if (s.typeName === "bomb" || s.typeName === "raft") return;

    const parts = getLogicalSwimmerParts(s);
    let dy = Infinity;

    parts.forEach(part => {
      if (Math.abs(part.globalSubLane - pSub) <= 1) {
        const d = Math.abs((part.y + part.h / 2) - pcy);
        if (d < dy) dy = d;
      }
    });

    if (dy > 150) return;

    found.push({ s, dy });
  });

  found.sort((a, b) => a.dy - b.dy);

  return found.slice(0, maxCount).map(f => f.s);
}

function invokeRussianBallTwist() {
  if (russianBallTwistUsed) return;
  if (gamePaused || gameFinished) return;
  if (!player.swimming) return;

  // ✅ ruimt tot 3 zwemmers in de buurt op — de comic is het waard
  const targets = findBallTwistTargets(3);
  if (targets.length === 0) return; // alleen als er echt een botsing dreigt

  russianBallTwistUsed = true;
  agentMetrics.ballTwistUsed = true;
  logAgentEvent("ballTwist", { targets: targets.map(t => t.typeName) });

  overlay = {
    text: "RUSSIAN BALL TWIST",
    comic: true,
    timer: 180,
    duration: 180,
    onDone: () => {
      gamePaused = false;

      // de geraakte zwemmers verlaten het bad via de uitgang, met een wolk erbij
      targets.forEach(target => {
        if (target.removeMe) return;
        target.markedForExit = true;
        target.beatenEscort = true;
        target.escortTimer = 1;
        startExit(target);
        spawnFightCloud(target.x + SWIMMER_SIZE / 2, target.y + SWIMMER_SIZE / 2);
      });
    }
  };

  gamePaused = true;
}

// =====================================================
// PENALTIES
// =====================================================

function applyPlayerPenalty(pushBack) {
  if (hitCooldown > 0) return;

  hits++;
  hitCooldown = 35;

  agentMetrics.playerHits++;
  logAgentEvent("playerHit", { hits });

  // boze stofwolk op de speler
  spawnFightCloud(player.x + PLAYER_SIZE / 2, player.y + PLAYER_SIZE / 2);

  player.penaltyTimer = player.penaltyDuration;

  if (player.speedY > 0) {
    player.speedY = player.minSpeed;
  } else {
    player.speedY = -player.minSpeed;
  }

  player.color = "orange";

  if (pushBack) {
    if (player.speedY < 0) {
      player.y += 10;
    } else {
      player.y -= 10;
    }

    player.y = clamp(player.y, POOL_Y, POOL_Y + POOL_HEIGHT - PLAYER_SIZE);
  }
}

// ✅ zachte straf voor het oversteken van een witte lijn zonder duik:
// geen "botsing" richting game-over, wel even flink afgeremd
function applyLineCrossPenalty() {
  agentMetrics.linePenalties++;
  logAgentEvent("linePenalty", {});

  player.penaltyTimer = 90;

  if (player.speedY > 0) {
    player.speedY = player.minSpeed;
  } else {
    player.speedY = -player.minSpeed;
  }

  player.color = "orange";
}

function applySwimmerPenalty(s) {
  if (s.penaltyTimer > 0) return;

  s.penaltyTimer = SWIMMER_PENALTY_DURATION;

  const direction = s.speedY >= 0 ? 1 : -1;
  const slowSpeed = Math.max(0.18, Math.abs(s.normalSpeed) * 0.25);

  s.speedY = direction * slowSpeed;
}

// =====================================================
// PLAYER HORIZONTAL MOVEMENT
// =====================================================

function movePlayerHorizontal(direction) {

  const newSubLane = player.globalSubLane + direction;

  if (newSubLane < 0 || newSubLane >= getTotalSubLanes()) {
    return;
  }

  // ✅ op rand mag je vrij wisselen
  if (!player.swimming) {
    player.globalSubLane = newSubLane;
    player.x = xForGlobalSubLane(player.globalSubLane);
    return;
  }

  // ✅ lijn oversteken zonder duik = zachte straf (afremmen),
  // maar de baanwissel lukt wél — geen dubbele bestraffing meer
  const crossesLine = crossesMainLaneBoundary(player.globalSubLane, newSubLane);

  if (crossesLine && !player.isDiving) {
    applyLineCrossPenalty();
  }

  player.globalSubLane = newSubLane;
  player.x = xForGlobalSubLane(player.globalSubLane);
}



// =====================================================
// LANE SELECTION
// =====================================================

function lanePopulation(lane) {
  return getLaneStats(lane).population;
}

function laneAverageSpeed(lane) {
  return getLaneStats(lane).avgSpeed;
}

function laneAggression(lane) {
  return getLaneStats(lane).aggression;
}

function chooseCalmestLane() {
  const candidates = [];

  for (let lane = 0; lane < LANE_COUNT; lane++) {
    const stats = getLaneStats(lane);

    candidates.push({
      lane,
      count: stats.population,
      avgSpeed: stats.avgSpeed,
      aggression: stats.aggression
    });
  }

  candidates.sort((a, b) => {
    if (a.count !== b.count) return a.count - b.count;
    if (Math.abs(a.avgSpeed - b.avgSpeed) > 0.001) return a.avgSpeed - b.avgSpeed;
    if (a.aggression !== b.aggression) return a.aggression - b.aggression;
    return Math.random() - 0.5;
  });

  return candidates[0].lane;
}

// =====================================================
// PATHS
// =====================================================

function buildEntryPath(entryX, entryY) {
  return [
    { x: RIGHT_WALKWAY_X, y: GATE.y },
    { x: RIGHT_WALKWAY_X, y: entryY },
    { x: entryX, y: entryY }
  ];
}

function buildExitPath(fromX, fromY) {
  return [
    { x: RIGHT_WALKWAY_X, y: fromY },
    { x: RIGHT_WALKWAY_X, y: GATE.y },
    { x: GATE.x, y: GATE.y }
  ];
}

function updatePathFollower(s) {
  if (!s.path || s.path.length === 0) return true;

  const target = s.path[0];
  const arrived = moveTowards(s, target.x, target.y, s.walkSpeed);

  if (arrived) {
    s.path.shift();
  }

  return s.path.length === 0;
}

function chooseEntryLadderForLane(lane) {
  const wantRight = lane >= Math.floor(LANE_COUNT / 2);
  const rightLadders = LADDERS.filter(l => l.side === "right");
  const leftLadders = LADDERS.filter(l => l.side === "left");

  return wantRight ? randomFromArray(rightLadders) : randomFromArray(leftLadders);
}

function buildElderlyEntryPath(ladder) {
  const path = [];

  path.push({ x: RIGHT_WALKWAY_X, y: GATE.y });
  path.push({ x: RIGHT_WALKWAY_X, y: ladder.y });

  if (ladder.side === "right") {
    path.push({ x: POOL_X + POOL_WIDTH + DECK_MARGIN, y: ladder.y });
  } else {
    path.push({ x: POOL_X - DECK_MARGIN, y: ladder.y });
  }

  return path;
}

// =====================================================
// SWIMMER TYPES
// =====================================================

function chooseWideAvoidance(s, o) {
  const lane = s.lane;
  const maxInside = getSubLanesPerLane() - 1;

  const curInside = subLaneInsideLane(Math.round(s.globalSubLane));
  const oInside = subLaneInsideLane(Math.round(o.globalSubLane));

  // Bejaardengroep is 2 vakken breed (bezet oInside..oInside+1):
  // kies het vak dat helemaal vrij is.
  if (o.typeName === "elderlyGroup") {
    const free = (oInside <= 0) ? maxInside : 0;
    return globalSubLaneFromLaneAndSub(lane, free);
  }

  // Wijk naar de kant weg van de ander; bij gelijke positie naar de open kant.
  let dir;
  if (oInside > curInside) {
    dir = -1;
  } else if (oInside < curInside) {
    dir = 1;
  } else {
    dir = (curInside < maxInside) ? 1 : -1;
  }

  let targetInside = curInside + dir;

  // Nooit de muur in: als die kant dicht is, ga de andere kant op.
  if (targetInside < 0 || targetInside > maxInside) {
    targetInside = curInside - dir;
  }

  targetInside = clamp(targetInside, 0, maxInside);

  return globalSubLaneFromLaneAndSub(lane, targetInside);
}

// generieke uitwijk-behavior voor nette zwemmers
function makeAvoidBehavior(range, timer) {
  return function(s, others) {
    others.forEach(o => {
      if (o === s) return;
      if (o.state !== "swimming") return;
      if (!shouldAvoid(s, o)) return;
      if (!swimmersShareLogicalSubLane(s, o)) return;

      const distance = forwardDistance(s, o);

      if (distance < range && distance > 12 && !s.avoiding) {
        s.avoiding = true;
        s.avoidTimer = timer;
        s.targetGlobalSubLane = chooseWideAvoidance(s, o);
        s.returnToLane = true;
      }
    });
  };
}

function noBehavior() {
  // Anticipeert niet / beweegt via eigen state-machine.
}

// =====================================================
// TYPE AVAILABILITY
// =====================================================

// Elk level introduceert één extra zwemmertype (cumulatief).
const TYPE_UNLOCKS = [
  [],                                                                                                            // 0 (ongebruikt)
  ["ordinary"],                                                                                                  // level 1
  ["ordinary", "slower"],                                                                                        // level 2
  ["ordinary", "slower", "faster"],                                                                              // level 3
  ["ordinary", "slower", "faster", "elderlySingle"],                                                             // level 4
  ["ordinary", "slower", "faster", "elderlySingle", "friendlyCrawl"],                                            // level 5
  ["ordinary", "slower", "faster", "elderlySingle", "friendlyCrawl", "elderlyGroup"],                            // level 6
  ["ordinary", "slower", "faster", "elderlySingle", "friendlyCrawl", "elderlyGroup", "unfriendlyCrawl"],         // level 7
  ["ordinary", "slower", "faster", "elderlySingle", "friendlyCrawl", "elderlyGroup", "unfriendlyCrawl", "bomb"], // level 8
  ["ordinary", "slower", "faster", "elderlySingle", "friendlyCrawl", "elderlyGroup", "unfriendlyCrawl", "bomb", "raft"] // level 9
];

// hoeveel van een speciaal type tegelijk in het bad mogen
const TYPE_CAPS = {
  elderlySingle: 3,
  elderlyGroup: 2,
  bomb: 2,
  raft: 2
};

function countType(typeName) {
  return swimmers.filter(s => s.typeName === typeName && s.state !== "walkingOut").length;
}

function getAvailableSwimmerTypes() {
  const idx = Math.min(level, TYPE_UNLOCKS.length - 1);
  return TYPE_UNLOCKS[idx];
}

// =====================================================
// CREATE SWIMMER
// =====================================================

function countElderly() {
  return swimmers.filter(s => s.typeName === "elderlyGroup").length;
}

function laneHasElderly(lane) {
  return swimmers.some(s =>
    s.typeName === "elderlyGroup" &&
    s.lane === lane &&
    s.state !== "walkingOut"
  );
}

function createSwimmer(randomPosition) {
  let typeName;

  // de eerste binnenkomers van een level zijn altijd het nieuwe type
  if (!randomPosition && forcedNewTypeCount > 0 && forcedNewType) {
    typeName = forcedNewType;
    forcedNewTypeCount--;
  } else {
    // respecteer de caps op speciale types
    let typeNames = getAvailableSwimmerTypes().filter(t => {
      const cap = TYPE_CAPS[t];
      return cap === undefined || countType(t) < cap;
    });

    if (typeNames.length === 0) {
      typeNames = ["ordinary"];
    }

    typeName = randomFromArray(typeNames);
  }

  // bommetje en vlot hebben hun eigen spawn-logica
  if (typeName === "bomb") return createBomb();
  if (typeName === "raft") return createRaft();

  const type = SWIMMER_TYPES[typeName];

  let lane;

  if (typeName === "elderlyGroup") {

    // ✅ alleen lanes zonder bejaarden
    const freeLanes = [];

    for (let i = 0; i < LANE_COUNT; i++) {
      if (!laneHasElderly(i)) {
        freeLanes.push(i);
      }
    }

    // fallback (zou zelden gebeuren)
    if (freeLanes.length > 0) {
      lane = randomFromArray(freeLanes);
    } else {
      lane = Math.floor(Math.random() * LANE_COUNT);
    }

  } else {
    lane = randomPosition
      ? Math.floor(Math.random() * LANE_COUNT)
      : chooseCalmestLane();
  }

  let globalSubLane;

  if (typeName === "elderlyGroup") {
    globalSubLane = randomElderlyStartSubLaneInLane(lane);
  } else {
    globalSubLane = randomGlobalSubLaneInLane(lane);
  }

  const baseX = xForSwimmerGlobalSubLane(globalSubLane);

  const fromTop = Math.random() < 0.5;
  const direction = fromTop ? 1 : -1;

  const speed = speedFromScale(type.speedMin, type.speedMax);

  const targetLanes =
    type.lanesMin + Math.floor(Math.random() * (type.lanesMax - type.lanesMin + 1));

  let x;
  let y;
  let state;
  let path = [];

  const entryDeckY = fromTop ? TOP_WALKWAY_Y : BOTTOM_WALKWAY_Y;
  const jumpX = baseX;
  const jumpY = entryDeckY;

  let entryLadder = null;
  let groupSize = 1;
  let enteringMember = 0;
  let enterTimer = 0;

  // kleedhokje en handdoek-velden (alleen voor gewone zwemmers via de kassa)
  const cw = CABIN_W / CABIN_COUNT;
  const cabinNum = Math.floor(Math.random() * CABIN_COUNT);
  const cabinCX = CABIN_X + cabinNum * cw + Math.floor(cw / 2) - Math.floor(SWIMMER_SIZE / 2);
  let towelX = 0, towelY = 0, towelColor = null, towelAngle = 0;

  if (typeName === "elderlyGroup") {
    groupSize = Math.random() < 0.65 ? 2 : 3;

    // groep verschijnt aan de boven- of onderrand en begint te zwemmen
    x = baseX;
    state = "swimming";

    if (randomPosition) {
      y = POOL_Y + Math.random() * (POOL_HEIGHT - SWIMMER_SIZE);
    } else {
      y = fromTop ? POOL_Y : POOL_Y + POOL_HEIGHT - SWIMMER_SIZE;
    }
  } else {
    if (randomPosition) {
      x = baseX;
      y = POOL_Y + Math.random() * (POOL_HEIGHT - SWIMMER_SIZE);
      state = "swimming";
    } else {
      x = GATE.x;
      y = GATE.y;

      // 40% kans: zwemmer legt eerst handdoek neer op het gras
      const wantsTowel = Math.random() < 0.4;
      const freeSpot = wantsTowel
        ? TOWEL_SPOTS.find(sp =>
            !towels.some(t => Math.abs(t.x - sp.x) < 28 && Math.abs(t.y - sp.y) < 28) &&
            !swimmers.some(s => s.state === "goingToTowelSpot" &&
              Math.abs(s.towelX - sp.x) < 28 && Math.abs(s.towelY - sp.y) < 28)
          )
        : null;

      if (freeSpot) {
        towelX = freeSpot.x;
        towelY = freeSpot.y;
        towelColor = TOWEL_COLORS[Math.floor(Math.random() * TOWEL_COLORS.length)];
        towelAngle = (Math.random() - 0.5) * 0.5;
        state = "goingToTowelSpot";
        path = [{ x: towelX, y: towelY }];
      } else {
        state = "goingToCabin";
        path = [
          { x: cabinCX, y: GATE.y },
          { x: cabinCX, y: CABIN_Y + CABIN_H - 4 }
        ];
      }
    }
  }

  return {
    id: nextSwimmerId++,

    typeName,
    type,

    state,

    lane,
    globalSubLane,
    originalGlobalSubLane: globalSubLane,
    targetGlobalSubLane: globalSubLane,

    baseX,
    x,
    y,

    jumpX,
    jumpY,
    fromTop,

    path,

    speedY: speed * direction,
    normalSpeed: speed,
    walkSpeed: typeName === "elderlyGroup" ? 0.85 : 1.5,

    avoiding: false,
    avoidTimer: 0,
    returnToLane: true,

    stopped: false,
    stopTimer: 0,

    lanesSwum: 0,
    targetLanes,

    markedForExit: false,
    exitLadder: null,
    removeMe: false,

    groupSize,
    entryLadder,
    enteringMember,
    enterTimer,

    penaltyTimer: 0,

    // kleedhokje + handdoek
    cabinCX,
    cabinTimer: 0,
    towelX,
    towelY,
    towelColor,
    towelAngle,
    towelTimer: 0,

    // bommetje / vlot velden (defaults)
    vx: 0,
    vy: 0,
    splashTimer: 0,
    floatTimer: 0,
    splashRadius: 0
  };
}

// =====================================================
// BOMMETJE (LEVEL 8)
// =====================================================

function createBomb() {
  const type = SWIMMER_TYPES.bomb;

  // kies een kant van het bad (lange zijde) en een hoogte
  const fromLeft = Math.random() < 0.5;
  const lane = fromLeft ? 0 : LANE_COUNT - 1;
  const sub = fromLeft ? 0 : getSubLanesPerLane() - 1;
  const globalSubLane = globalSubLaneFromLaneAndSub(lane, sub);

  const targetX = xForSwimmerGlobalSubLane(globalSubLane);
  const deckX = fromLeft ? POOL_X - DECK_MARGIN : POOL_X + POOL_WIDTH + DECK_MARGIN;
  const splashY = POOL_Y + 60 + Math.random() * (POOL_HEIGHT - 140);

  return {
    id: nextSwimmerId++,
    typeName: "bomb",
    type,

    state: "bombApproach",

    lane,
    globalSubLane,
    originalGlobalSubLane: globalSubLane,
    targetGlobalSubLane: globalSubLane,

    fromLeft,
    deckX,
    targetX,

    baseX: targetX,
    x: deckX,
    y: splashY,

    path: [],

    speedY: 0,
    normalSpeed: 0,
    walkSpeed: 1.5,

    avoiding: false,
    avoidTimer: 0,
    returnToLane: false,

    stopped: false,
    stopTimer: 0,

    lanesSwum: 0,
    targetLanes: 0,

    markedForExit: false,
    exitLadder: null,
    removeMe: false,

    groupSize: 1,
    entryLadder: null,
    enteringMember: 0,
    enterTimer: 18,

    penaltyTimer: 0,

    vx: 0,
    vy: 0,
    splashTimer: 0,
    floatTimer: 0,
    splashRadius: 0
  };
}

// =====================================================
// VLOT MET KINDEREN (LEVEL 9)
// =====================================================

const RAFT_WIDTH = 54;
const RAFT_HEIGHT = 30;

function createRaft() {
  const type = SWIMMER_TYPES.raft;

  const x = POOL_X + 20 + Math.random() * (POOL_WIDTH - RAFT_WIDTH - 40);
  const y = POOL_Y + 20 + Math.random() * (POOL_HEIGHT - RAFT_HEIGHT - 40);

  const speed = 0.7 + Math.random() * 0.6;
  const angle = Math.random() * Math.PI * 2;

  return {
    id: nextSwimmerId++,
    typeName: "raft",
    type,

    state: "rafting",

    lane: 0,
    globalSubLane: 0,
    originalGlobalSubLane: 0,
    targetGlobalSubLane: 0,

    baseX: x,
    x,
    y,

    path: [],

    speedY: 0,
    normalSpeed: 0,
    walkSpeed: 0,

    avoiding: false,
    avoidTimer: 0,
    returnToLane: false,

    stopped: false,
    stopTimer: 0,

    lanesSwum: 0,
    targetLanes: 0,

    markedForExit: false,
    exitLadder: null,
    removeMe: false,

    groupSize: Math.random() < 0.5 ? 1 : 2,
    entryLadder: null,
    enteringMember: 0,
    enterTimer: 0,

    penaltyTimer: 0,

    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,

}

// =====================================================
// EINDBAAS: DUIKERSLINIE (LEVEL 10)
// =====================================================

function createDiver(lane, sub, speed) {
  const type = SWIMMER_TYPES.unfriendlyCrawl;
  const globalSubLane = globalSubLaneFromLaneAndSub(lane, sub);

  return {
    id: nextSwimmerId++,
    typeName: "unfriendlyCrawl",
    type,

    state: "swimming",

    lane,
    globalSubLane,
    originalGlobalSubLane: globalSubLane,
    targetGlobalSubLane: globalSubLane,

    baseX: xForSwimmerGlobalSubLane(globalSubLane),
    x: xForSwimmerGlobalSubLane(globalSubLane),
    y: POOL_Y,

    jumpX: 0,
    jumpY: 0,
    fromTop: true,

    path: [],

    speedY: Math.abs(speed),
    normalSpeed: speed,
    walkSpeed: 1.5,

    avoiding: false,
    avoidTimer: 0,
    returnToLane: false,

    stopped: false,
    stopTimer: 0,

    lanesSwum: 0,
    targetLanes: 999999, // blijft op en neer zwemmen als linie
    isBoss: true,

    markedForExit: false,
    exitLadder: null,
    removeMe: false,

    groupSize: 1,
    entryLadder: null,
    enteringMember: 0,
    enterTimer: 0,

    penaltyTimer: 0,

    vx: 0,
    vy: 0,
    splashTimer: 0,
    floatTimer: 0,
    splashRadius: 0
  };
}

function spawnBossLine() {
  swimmers = [];

  const speed = speedFromScale(24, 24); // identiek tempo → bewegen als één lijn

  for (let lane = 0; lane < LANE_COUNT; lane++) {
    for (let sub = 0; sub < getSubLanesPerLane(); sub++) {
      swimmers.push(createDiver(lane, sub, speed));
    }
  }
}

// =====================================================
// INITIAL POPULATION
// =====================================================

function populateInitialSwimmers() {
  swimmers = [];

  const count = getStartSwimmers();

  for (let i = 0; i < count; i++) {
    swimmers.push(createSwimmer(true));
  }
}

populateInitialSwimmers();

// =====================================================
// POPULATION SYSTEM
// =====================================================

function getOccupiedSubLanes() {
  const occupied = new Set();

  swimmers.forEach(s => {
    if (s.state !== "swimming") return;

    const parts = getLogicalSwimmerParts(s);
    parts.forEach(p => {
      occupied.add(p.globalSubLane);
    });
  });

  return occupied.size;
}

function spawnPopulationEvent() {

  if (gameFinished) return;
  if (gamePaused) return;        // niet spawnen tijdens level-intro
  if (level === 0) return;        // oefenbaan: geen andere zwemmers
  if (level >= MAX_LEVEL) return; // eindbaas: geen losse zwemmers

  const max = getMaxSwimmers();

  // tel actieve zwemmers (niet degene die al weggaan)
  const activeCount = swimmers.filter(s =>
    s.state !== "walkingOut"
  ).length;

  // =========================
  // ✅ GROEIFASE (onder max)
  // =========================
  if (activeCount < max) {

    // ✅ altijd minstens 1 spawn
    swimmers.push(createSwimmer(false));

    // ✅ extra spawn als het nog leeg is (sneller opbouwen)
    if (activeCount < max * 0.5) {
      swimmers.push(createSwimmer(false));
    }

    // ✅ kleine kans op extra variatie
    if (Math.random() < 0.3) {
      swimmers.push(createSwimmer(false));
    }
  }

  // =========================
  // ✅ STABILISATIE (op max)
  // =========================
  else {

    const candidates = swimmers.filter(
      s => s.state === "swimming" && !s.markedForExit
    );

    if (candidates.length > Math.max(5, getStartSwimmers())) {

      // ✅ kies iemand om rustig te laten vertrekken
      const chosen = randomFromArray(candidates);
      chosen.markedForExit = true;
    }
  }
}

function scheduleNextPopulationEvent() {
  // snel bijvullen tijdens de opbouw, rustiger als het bad vol is
  const activeCount = swimmers.filter(s => s.state !== "walkingOut").length;
  const stillFilling = activeCount < getMaxSwimmers();

  const delay = stillFilling
    ? 600 + Math.random() * 900    // 0.6–1.5s: bad vult snel
    : 2500 + Math.random() * 2500; // 2.5–5s: gewone doorstroming

  setTimeout(() => {
    if (!gameFinished) {
      if (!agentMode) spawnPopulationEvent(); // in agent-mode spawnt __agent.step
      scheduleNextPopulationEvent();
    }
  }, delay);
}

scheduleNextPopulationEvent();

// =====================================================
// PLAYER UPDATE
// =====================================================

// ✅ na elke voltooide baan komt er 1 duik terug (tot het maximum)
function completePlayerLane() {
  lanesCompleted++;
  lanesThisLevel++;

  if (level < MAX_LEVEL && player.divesLeft < MAX_DIVES_PER_LEVEL) {
    player.divesLeft++;
  }

  checkLevelProgress();
}

function updatePlayer() {
  player.x = xForGlobalSubLane(player.globalSubLane);

  // ✅ STAAT OP RAND → nog niet zwemmen
  if (!player.swimming) {
    player.y = POOL_Y - 22; // blijft op rand
    return;
  }

  updateDive();

  if (player.penaltyTimer > 0) {
    player.penaltyTimer--;

    // ✅ straf voorbij → terug naar de gekozen kruissnelheid
    // (voorkomt dat één botsing je de rest van het level traag houdt)
    if (player.penaltyTimer === 0) {
      player.speedY = (player.speedY < 0 ? -1 : 1) * player.cruiseSpeed;
    }
  }

  player.y += player.speedY;

  if (player.y < POOL_Y) {
    player.y = POOL_Y;

    player.speedY = Math.abs(player.penaltyTimer > 0 ? player.speedY : player.cruiseSpeed);

    completePlayerLane();
  }

  if (player.y > POOL_Y + POOL_HEIGHT - PLAYER_SIZE) {
    player.y = POOL_Y + POOL_HEIGHT - PLAYER_SIZE;

    player.speedY = -Math.abs(player.penaltyTimer > 0 ? player.speedY : player.cruiseSpeed);

    completePlayerLane();
  }

  if (player.penaltyTimer > 0) {
    player.color = "orange";
  } else if (player.color === "orange") {
    player.color = PLAYER_COLOR;
  }
}

// =====================================================
// ENTRY / EXIT LOGIC
// =====================================================

function updateGoingToTowelSpot(s) {
  const arrived = updatePathFollower(s);
  if (arrived) {
    towels.push({ x: s.x, y: s.y, color: s.towelColor, angle: s.towelAngle });
    s.state = "layingTowel";
    s.towelTimer = 35 + Math.floor(Math.random() * 25);
  }
}

function updateLayingTowel(s) {
  s.towelTimer--;
  if (s.towelTimer <= 0) {
    s.state = "goingToCabin";
    s.path = [
      { x: s.x, y: GATE.y },
      { x: s.cabinCX, y: GATE.y },
      { x: s.cabinCX, y: CABIN_Y + CABIN_H - 4 }
    ];
  }
}

function updateGoingToCabin(s) {
  const arrived = updatePathFollower(s);
  if (arrived) {
    s.state = "inCabin";
    s.cabinTimer = 50 + Math.floor(Math.random() * 30);
  }
}

function updateInCabin(s) {
  s.cabinTimer--;
  if (s.cabinTimer <= 0) {
    s.state = "walkingIn";
    s.path = [
      { x: s.x, y: GATE.y },
      { x: RIGHT_WALKWAY_X, y: GATE.y },
      { x: RIGHT_WALKWAY_X, y: s.jumpY },
      { x: s.jumpX, y: s.jumpY }
    ];
  }
}

function updateWalkingIn(s) {
  const arrived = updatePathFollower(s);

  if (arrived) {
    s.state = "waitingToJump";
    s.jumpTimer = 18;
  }
}

function updateWaitingToJump(s) {
  s.jumpTimer--;

  if (s.jumpTimer <= 0) {
    s.state = "swimming";
    s.x = xForSwimmerGlobalSubLane(s.globalSubLane);

    if (s.fromTop) {
      s.y = POOL_Y;
      s.speedY = Math.abs(s.normalSpeed);
    } else {
      s.y = POOL_Y + POOL_HEIGHT - SWIMMER_SIZE;
      s.speedY = -Math.abs(s.normalSpeed);
    }
  }
}

function updateGoingToLadderToEnter(s) {
  const arrived = updatePathFollower(s);

  if (arrived) {
    s.state = "enteringByLadder";
    s.enterTimer = 45;
    s.enteringMember = 0;
  }
}

function updateEnteringByLadder(s) {
  s.enterTimer--;

  if (s.entryLadder.side === "left") {
    s.x = POOL_X - 12;
  } else {
    s.x = POOL_X + POOL_WIDTH - 8;
  }

  s.y = s.entryLadder.y + s.enteringMember * 10;

  if (s.enterTimer <= 0) {
    s.enteringMember++;

    if (s.enteringMember >= s.groupSize) {
      s.state = "swimming";
      s.x = xForSwimmerGlobalSubLane(s.globalSubLane);
      s.y = s.entryLadder.y;

      if (s.entryLadder.y < POOL_Y + POOL_HEIGHT / 2) {
        s.speedY = Math.abs(s.normalSpeed);
      } else {
        s.speedY = -Math.abs(s.normalSpeed);
      }
    } else {
      s.enterTimer = 45;
    }
  }
}

function nearestLadder(s) {
  let best = LADDERS[0];
  let bestDistance = Infinity;

  LADDERS.forEach(l => {
    const dx = l.x - s.x;
    const dy = l.y - s.y;
    const d = Math.sqrt(dx * dx + dy * dy);

    if (d < bestDistance) {
      best = l;
      bestDistance = d;
    }
  });

  return best;
}

function startExit(s) {
  s.exitLadder = nearestLadder(s);
  s.state = "goingToLadder";
  s.targetGlobalSubLane = s.globalSubLane;
}

function updateGoingToLadder(s) {
  // ✅ ladders zitten aan de boven-/onderrand: zwem BINNEN het bad
  // naar de ladder toe (voorheen zwommen zwemmers het bad uit)
  const ladderWaterX = clamp(
    s.exitLadder.x - SWIMMER_SIZE / 2,
    POOL_X,
    POOL_X + POOL_WIDTH - SWIMMER_SIZE
  );

  const ladderWaterY =
    s.exitLadder.side === "top"
      ? POOL_Y
      : POOL_Y + POOL_HEIGHT - SWIMMER_SIZE;

  const arrived = moveTowards(s, ladderWaterX, ladderWaterY, 1.2);

  if (arrived) {
    s.state = "climbingOut";
    s.climbTimer = 24;
  }
}

function updateClimbingOut(s) {
  s.climbTimer--;

  if (s.climbTimer <= 0) {
    // ✅ stap op de kant bij de ladder (boven of onder), daarna
    // via de looppaden naar de uitgang
    s.x = s.exitLadder.x - SWIMMER_SIZE / 2;
    s.y = (s.exitLadder.side === "top" ? TOP_WALKWAY_Y : BOTTOM_WALKWAY_Y) - SWIMMER_SIZE / 2;

    s.path = buildExitPath(s.x, s.y);
    s.state = "walkingOut";
  }
}

function updateWalkingOut(s) {
  const arrived = updatePathFollower(s);

  if (arrived) {
    s.removeMe = true;
  }
}

// =====================================================
// BOMMETJE / VLOT MOVEMENT
// =====================================================

function updateBomb(s) {
  if (s.state === "bombApproach") {
    const arrived = moveTowards(s, s.targetX, s.y, 2.4);

    if (arrived) {
      s.state = "bombJump";
      s.splashTimer = 26;
      s.splashRadius = 0;
    }
    return;
  }

  if (s.state === "bombJump") {
    s.splashTimer--;
    s.splashRadius = Math.min(24, s.splashRadius + 1.4);

    if (s.splashTimer <= 0) {
      s.state = "bombFloat";
      s.floatTimer = 80;
    }
    return;
  }

  if (s.state === "bombFloat") {
    s.floatTimer--;
    s.splashRadius = Math.max(9, s.splashRadius - 0.15);

    if (s.floatTimer <= 0) {
      startExit(s); // klimt via dichtstbijzijnde trap het bad uit
    }
    return;
  }
}

function updateRaft(s) {
  s.x += s.vx;
  s.y += s.vy;

  const minX = POOL_X + 2;
  const maxX = POOL_X + POOL_WIDTH - RAFT_WIDTH - 2;
  const minY = POOL_Y + 2;
  const maxY = POOL_Y + POOL_HEIGHT - RAFT_HEIGHT - 2;

  if (s.x < minX) { s.x = minX; s.vx = Math.abs(s.vx); }
  if (s.x > maxX) { s.x = maxX; s.vx = -Math.abs(s.vx); }
  if (s.y < minY) { s.y = minY; s.vy = Math.abs(s.vy); }
  if (s.y > maxY) { s.y = maxY; s.vy = -Math.abs(s.vy); }
}

// =====================================================
// SWIMMER UPDATE
// =====================================================

function updateSwimmerBehavior() {
  // anticipeer alleen op zwemmers in het water (niet op wandelaars op de kant)
  const activeSwimmers = swimmers.filter(s => s.state === "swimming");

  activeSwimmers.forEach(s => {
    s.type.behavior(s, activeSwimmers);

    if (s.avoiding) {
      s.avoidTimer--;

      if (s.avoidTimer <= 0) {
        s.avoiding = false;

        if (s.returnToLane) {
          s.targetGlobalSubLane = s.originalGlobalSubLane;
        }
      }
    }

    if (!s.avoiding && s.returnToLane && s.typeName !== "elderlyGroup") {
      s.targetGlobalSubLane = s.originalGlobalSubLane;
    }
  });
}

function updateSwimmerSpeedPenalty(s) {
  if (s.penaltyTimer > 0) {
    s.penaltyTimer--;

    const direction = s.speedY >= 0 ? 1 : -1;
    const targetSpeed = Math.abs(s.normalSpeed);
    let currentSpeed = Math.abs(s.speedY);

    currentSpeed += 0.012;
    currentSpeed = Math.min(currentSpeed, targetSpeed);

    s.speedY = direction * currentSpeed;
  }
}

function updateSwimmerMovement() {
  swimmers.forEach(s => {

    // verslagen zwemmer krijgt onderweg naar de uitgang een stofwolk mee
    if (s.beatenEscort) {
      s.escortTimer--;
      if (s.escortTimer <= 0) {
        spawnFightCloud(s.x + SWIMMER_SIZE / 2, s.y + SWIMMER_SIZE / 2);
        s.escortTimer = 12;
      }
    }

    if (s.state === "bombApproach" || s.state === "bombJump" || s.state === "bombFloat") {
      updateBomb(s);
      return;
    }

    if (s.state === "rafting") {
      updateRaft(s);
      return;
    }

    if (s.state === "goingToLadderToEnter") {
      updateGoingToLadderToEnter(s);
      return;
    }

    if (s.state === "enteringByLadder") {
      updateEnteringByLadder(s);
      return;
    }

    if (s.state === "goingToTowelSpot") {
      updateGoingToTowelSpot(s);
      return;
    }

    if (s.state === "layingTowel") {
      updateLayingTowel(s);
      return;
    }

    if (s.state === "goingToCabin") {
      updateGoingToCabin(s);
      return;
    }

    if (s.state === "inCabin") {
      updateInCabin(s);
      return;
    }

    if (s.state === "walkingIn") {
      updateWalkingIn(s);
      return;
    }

    if (s.state === "waitingToJump") {
      updateWaitingToJump(s);
      return;
    }

    if (s.state === "goingToLadder") {
      updateGoingToLadder(s);
      return;
    }

    if (s.state === "climbingOut") {
      updateClimbingOut(s);
      return;
    }

    if (s.state === "walkingOut") {
      updateWalkingOut(s);
      return;
    }

    if (s.state !== "swimming") return;

    updateSwimmerSpeedPenalty(s);

    if (s.stopped) {
      s.stopTimer--;

      if (s.stopTimer <= 0) {
        s.stopped = false;
      }
    } else {
      s.y += s.speedY;
    }

    if (s.y < POOL_Y) {
      s.y = POOL_Y;

      if (s.markedForExit || s.lanesSwum >= s.targetLanes) {
        startExit(s);
        return;
      }

      s.speedY = Math.abs(s.speedY);
      s.lanesSwum++;
    }

    if (s.y > POOL_Y + POOL_HEIGHT - SWIMMER_SIZE) {
      s.y = POOL_Y + POOL_HEIGHT - SWIMMER_SIZE;

      if (s.markedForExit || s.lanesSwum >= s.targetLanes) {
        startExit(s);
        return;
      }

      s.speedY = -Math.abs(s.speedY);
      s.lanesSwum++;
    }

    if (s.typeName !== "elderlyGroup") {
      s.globalSubLane += (s.targetGlobalSubLane - s.globalSubLane) * 0.2;

      const minGlobal = globalSubLaneFromLaneAndSub(s.lane, 0);
      const maxGlobal = globalSubLaneFromLaneAndSub(s.lane, getSubLanesPerLane() - 1);

      s.globalSubLane = clamp(s.globalSubLane, minGlobal, maxGlobal);
      s.x = xForSwimmerGlobalSubLane(s.globalSubLane);
    } else {
      const minGlobal = globalSubLaneFromLaneAndSub(s.lane, 0);
      const maxGlobal = globalSubLaneFromLaneAndSub(s.lane, getSubLanesPerLane() - 2);

      s.globalSubLane = clamp(s.globalSubLane, minGlobal, maxGlobal);
      s.x = xForSwimmerGlobalSubLane(s.globalSubLane);
    }
  });

  swimmers = swimmers.filter(s => !s.removeMe);
}

function updateSwimmers() {
  updateSwimmerBehavior();
  updateSwimmerMovement();
}

// =====================================================
// SWIMMER COLLISIONS
// =====================================================

function updatePairCollisionCooldowns() {
  Object.keys(pairCollisionCooldowns).forEach(key => {
    pairCollisionCooldowns[key]--;

    if (pairCollisionCooldowns[key] <= 0) {
      delete pairCollisionCooldowns[key];
    }
  });
}

// =====================================================
// BOTSINGS-EFFECT (stofwolk met vuisten)
// =====================================================

function spawnFightCloud(x, y) {
  if (fightClouds.length > 14) return; // niet overdrijven

  fightClouds.push({
    x,
    y,
    timer: 34,
    duration: 34,
    seed: Math.random() * Math.PI * 2
  });
}

function updateFightClouds() {
  for (let i = fightClouds.length - 1; i >= 0; i--) {
    fightClouds[i].timer--;
    if (fightClouds[i].timer <= 0) {
      fightClouds.splice(i, 1);
    }
  }
}

function updateSwimmerCollisions() {
  updatePairCollisionCooldowns();

  // alleen zwemmers DIE IN HET WATER liggen botsen — niet wie over de kant loopt
  const activeSwimmers = swimmers.filter(s => s.state === "swimming");

  for (let i = 0; i < activeSwimmers.length; i++) {
    const a = activeSwimmers[i];

    for (let j = i + 1; j < activeSwimmers.length; j++) {
      const b = activeSwimmers[j];

      if (!swimmersCollideLogical(a, b)) continue;

      const key = pairKey(a, b);

      applySwimmerPenalty(a);
      applySwimmerPenalty(b);

      if (!pairCollisionCooldowns[key]) {
        pairCollisionCounts[key] = (pairCollisionCounts[key] || 0) + 1;
        pairCollisionCooldowns[key] = PAIR_COLLISION_COOLDOWN;

        agentMetrics.swimmerCollisions++;

        // boze stofwolk tussen de twee zwemmers
        spawnFightCloud(
          (a.x + b.x) / 2 + SWIMMER_SIZE / 2,
          (a.y + b.y) / 2 + SWIMMER_SIZE / 2
        );

        if (pairCollisionCounts[key] > PAIR_COLLISION_LIMIT) {
          const swimmerToMove = chooseSwimmerToMoveAfterRepeatedCollision(a, b);
          forceSwimmerToLeastCrowdedSubLane(swimmerToMove);

          pairCollisionCounts[key] = 0;
          pairCollisionCooldowns[key] = PAIR_COLLISION_COOLDOWN;
        }
      }

      if (a.y < b.y) {
        a.y -= 3;
        b.y += 3;
      } else {
        a.y += 3;
        b.y -= 3;
      }

      a.y = clamp(a.y, POOL_Y, POOL_Y + POOL_HEIGHT - SWIMMER_SIZE);
      b.y = clamp(b.y, POOL_Y, POOL_Y + POOL_HEIGHT - SWIMMER_SIZE);
    }
  }
}

// =====================================================
// PLAYER COLLISIONS
// =====================================================


function bombHitsPlayer(s) {
  if (s.state !== "bombJump" && s.state !== "bombFloat") return false;
  if (Math.round(player.globalSubLane) !== Math.round(s.globalSubLane)) return false;

  const playerCenterY = player.y + PLAYER_SIZE / 2;
  return Math.abs(playerCenterY - s.y) < (s.splashRadius + PLAYER_SIZE / 2);
}

function raftHitsPlayer(s) {
  return (
    player.x < s.x + RAFT_WIDTH &&
    player.x + PLAYER_SIZE > s.x &&
    player.y < s.y + RAFT_HEIGHT &&
    player.y + PLAYER_SIZE > s.y
  );
}

function updatePlayerCollisions() {
  if (!player.swimming) return;

  if (hitCooldown > 0) hitCooldown--;

  if (player.isDiving) return;

  swimmers.forEach(s => {
    if (s.typeName === "bomb") {
      if (bombHitsPlayer(s)) applyPlayerPenalty(true);
      return;
    }

    if (s.typeName === "raft") {
      if (raftHitsPlayer(s)) applyPlayerPenalty(true);
      return;
    }

    if (s.state !== "swimming") return;

    if (playerCollidesWithSwimmerLogical(player, s)) {
      applyPlayerPenalty(true);
    }
  });
}

// =====================================================
// MAIN UPDATE
// =====================================================

function update() {
  updateOverlay();

  if (bPressTimer > 0) {
    bPressTimer--;
    if (bPressTimer === 0) bPressCount = 0;
  }

  if (gamePaused || gameFinished) {
    return;
  }

  updatePlayer();
  updateSwimmers();
  updateSwimmerCollisions();
  updatePlayerCollisions();
  updateFightClouds();
}

function drawGrassTuft(x, y, size) {

  ctx.ellipse(x + size * 0.3, y - size * 0.2, size * 0.5, size * 0.4, 0.3, 0, Math.PI * 2);

}

function drawParasol(x, y, color) {
