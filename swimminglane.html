<!DOCTYPE html>
<html>
<head>
  <title>Zwembad Game</title>
  <style>
    body {
      margin: 0;
      background: #b7e3f7;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
      margin: auto;
      background: #b7e3f7;
    }
  </style>
</head>
<body>

<canvas id="game" width="720" height="780"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// =====================================================
// CONFIG
// =====================================================

const POOL_X = 60;
const POOL_Y = 90;
const POOL_WIDTH = 400;
const POOL_HEIGHT = 600;

const LANE_COUNT = 5;
const LANE_WIDTH = 80;

const SUB_LANES_PER_LANE = 5;
const SUB_LANE_WIDTH = LANE_WIDTH / SUB_LANES_PER_LANE;

const SWIMMER_SIZE = 14;
const PLAYER_SIZE = 14;

const MAX_DIVES_PER_LEVEL = 3;

// =====================================================
// GAME STATE
// =====================================================

let swimmers = [];
let lanesCompleted = 0;
let lanesThisLevel = 0;

let hits = 0;
let level = 1;

let isLevelTransition = false;
let overlay = null;

// =====================================================
// OVERLAY SYSTEM ✅
// =====================================================

function showOverlay(text, duration, callback) {
  overlay = {
    text,
    timer: duration,
    duration
  };

  setTimeout(() => {
    overlay = null;
    if (callback) callback();
  }, duration);
}

// =====================================================
// PLAYER
// =====================================================

let player = {
  globalSubLane: 12,
  x: 0,
  y: POOL_Y + POOL_HEIGHT - PLAYER_SIZE,
  speedY: 0,
  baseSpeed: 2,
  swimming: false,
  divesLeft: MAX_DIVES_PER_LEVEL
};

// =====================================================
// HELPERS
// =====================================================

function xForSubLane(sublane) {
  return POOL_X + sublane * SUB_LANE_WIDTH + SUB_LANE_WIDTH / 2 - PLAYER_SIZE / 2;
}

// =====================================================
// LEVEL PROGRESSION ✅
// =====================================================

function checkLevelProgress() {
  if (lanesThisLevel < 10) return;
  if (isLevelTransition) return;

  isLevelTransition = true;

  showOverlay("LEVEL " + level + " CLEARED", 2000, () => {

    if (level >= 30) {
      showOverlay("GOED GEZWOMMEN!", 4000);
      return;
    }

    level++;

    // RESET
    lanesThisLevel = 0;
    hits = 0;
    player.divesLeft = MAX_DIVES_PER_LEVEL;

    isLevelTransition = false;
  });
}

// =====================================================
// PLAYER UPDATE
// =====================================================

function updatePlayer() {

  player.x = xForSubLane(player.globalSubLane);

  if (!player.swimming) return;

  player.y += player.speedY;

  if (player.y < POOL_Y) {
    player.y = POOL_Y;
    player.speedY = player.baseSpeed;

    lanesCompleted++;
    lanesThisLevel++;

    checkLevelProgress();
  }

  if (player.y > POOL_Y + POOL_HEIGHT - PLAYER_SIZE) {
    player.y = POOL_Y + POOL_HEIGHT - PLAYER_SIZE;
    player.speedY = -player.baseSpeed;

    lanesCompleted++;
    lanesThisLevel++;

    checkLevelProgress();
  }
}

// =====================================================
// DRAW
// =====================================================

function drawPool() {

  ctx.fillStyle = "#4FC3F7";
  ctx.fillRect(POOL_X, POOL_Y, POOL_WIDTH, POOL_HEIGHT);

  ctx.strokeStyle = "white";
  ctx.lineWidth = 4;

  for (let i = 1; i < LANE_COUNT; i++) {
    ctx.beginPath();
    ctx.moveTo(POOL_X + i * LANE_WIDTH, POOL_Y);
    ctx.lineTo(POOL_X + i * LANE_WIDTH, POOL_Y + POOL_HEIGHT);
    ctx.stroke();
  }
}

function drawPlayer() {

  ctx.fillStyle = "blue";
  ctx.fillRect(player.x, player.y, PLAYER_SIZE, PLAYER_SIZE);
}

function drawHud() {

  ctx.fillStyle = "black";
  ctx.font = "16px monospace";

  ctx.fillText("LEVEL: " + level, 520, 60);
  ctx.fillText("BANEN: " + lanesCompleted, 520, 90);
  ctx.fillText("IN LEVEL: " + lanesThisLevel + "/10", 520, 120);
  ctx.fillText("DUIKEN: " + player.divesLeft, 520, 150);
}

// =====================================================
// OVERLAY DRAW ✅
// =====================================================

function drawOverlay() {

  if (!overlay) return;

  const progress = overlay.timer / overlay.duration;

  ctx.globalAlpha = 1 - progress * 0.5;

  // dim background
  ctx.fillStyle = "rgba(0,0,0,0.6)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.globalAlpha = 1;

  ctx.fillStyle = "white";
  ctx.font = "bold 42px monospace";
  ctx.textAlign = "center";

  ctx.fillText(overlay.text, canvas.width / 2, canvas.height / 2);

  ctx.textAlign = "left";
}

// =====================================================
// LOOP
// =====================================================

function update() {

  if (!isLevelTransition) {
    updatePlayer();
  }

  if (overlay) {
    overlay.timer--;
  }
}

function draw() {

  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawPool();
  drawPlayer();
  drawHud();
  drawOverlay();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// =====================================================
// INPUT
// =====================================================

document.addEventListener("keydown", e => {

  if (e.code === "Space") {
    if (!player.swimming) {
      player.swimming = true;
      player.speedY = -player.baseSpeed;
    }
  }

  if (e.key === "ArrowLeft") {
    player.globalSubLane = Math.max(0, player.globalSubLane - 1);
  }

  if (e.key === "ArrowRight") {
    player.globalSubLane = Math.min(LANE_COUNT * SUB_LANES_PER_LANE - 1, player.globalSubLane + 1);
  }

});

// START
loop();
</script>

</body>
</html>
