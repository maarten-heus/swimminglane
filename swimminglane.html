function drawKleedhokjes(x, y) {
  const W = 80, H = 60, CABINS = 3;
  const cw = W / CABINS;

  // muur
  ctx.fillStyle = "#EFEBE9";
  ctx.fillRect(x, y, W, H);
  ctx.strokeStyle = "#8D6E63";
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, W, H);

  // scheidingswanden
  ctx.strokeStyle = "#BCAAA4";
  ctx.lineWidth = 1;
  for (let i = 1; i < CABINS; i++) {
    ctx.beginPath();
    ctx.moveTo(x + i * cw, y);
    ctx.lineTo(x + i * cw, y + H);
    ctx.stroke();
  }

  // deurtjes (onderste helft van elke cabin)
  for (let i = 0; i < CABINS; i++) {
    ctx.fillStyle = "#8D6E63";
    ctx.fillRect(x + i * cw + 5, y + H * 0.45, cw - 10, H * 0.5);
  }

  // label
  ctx.fillStyle = "#5D4037";
  ctx.font = "bold 9px monospace";
  ctx.textAlign = "center";
  ctx.fillText("KLEEDKAMERS", x + W / 2, y - 5);
  ctx.textAlign = "left";
}

function drawTiledPath(x1, y1, x2, y2, width) {
  // lichtgekleurde tegels langs het looppad
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.sqrt(dx * dx + dy * dy);
  const nx = -dy / len, ny = dx / len; // normaal loodrecht op het pad

  ctx.fillStyle = "#F5F0E8";
  ctx.save();
  ctx.translate(x1, y1);
  ctx.rotate(Math.atan2(dy, dx));
  ctx.fillRect(0, -width / 2, len, width);

  // tegelnaden
  ctx.strokeStyle = "#DDD5C0";
  ctx.lineWidth = 1;
  const tileSize = 20;
  for (let t = 0; t < len; t += tileSize) {
    ctx.beginPath(); ctx.moveTo(t, -width / 2); ctx.lineTo(t, width / 2); ctx.stroke();
  }
  for (let w = -width / 2; w < width / 2; w += tileSize) {
    ctx.beginPath(); ctx.moveTo(0, w); ctx.lineTo(len, w); ctx.stroke();
  }
  ctx.restore();
}

function drawDeck() {
  // =============================================
  // 1. GRAS — de achtergrond buiten het complex
  // =============================================
  ctx.fillStyle = "#388E3C";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // wat lichte grasstrepen voor structuur
  ctx.fillStyle = "rgba(255,255,255,0.04)";
  for (let y = 0; y < canvas.height; y += 18) {
    ctx.fillRect(0, y, canvas.width, 9);
  }

  // =============================================
  // 2. BETEGELD ZWEMBAD-DEK (het vlak rond het bad)
  // =============================================
  const deckL = POOL_X - DECK_MARGIN - 10;
  const deckT = POOL_Y - DECK_MARGIN - 10;
  const deckR = RIGHT_WALKWAY_X + 20;
  const deckB = POOL_Y + POOL_HEIGHT + DECK_MARGIN + 10;

  ctx.fillStyle = "#E8D4A2";
  ctx.fillRect(deckL, deckT, deckR - deckL, deckB - deckT);

  // tegelnaden dek
  ctx.strokeStyle = "#D2BD86";
  ctx.lineWidth = 1;
  for (let y = deckT; y < deckB; y += 28) {
    ctx.beginPath(); ctx.moveTo(deckL, y); ctx.lineTo(deckR, y); ctx.stroke();
  }
  for (let x = deckL; x < deckR; x += 28) {
    ctx.beginPath(); ctx.moveTo(x, deckT); ctx.lineTo(x, deckB); ctx.stroke();
  }

  // rand van het dek
  ctx.strokeStyle = "#B8A070";
  ctx.lineWidth = 3;
  ctx.strokeRect(deckL, deckT, deckR - deckL, deckB - deckT);

  // =============================================
  // 3. TEGEL-PADEN (looppad voor zwemmers)
  // =============================================
  const PATH_W = 22;

  // doorgaand horizontaal pad van kassa tot rechter looppad
  drawTiledPath(GATE.x - 30, GATE.y, RIGHT_WALKWAY_X, GATE.y, PATH_W);
  // verticale aftakking omhoog naar de kleedhokjes-ingang
  drawTiledPath(CABIN_X + 40, GATE.y, CABIN_X + 40, CABIN_Y + CABIN_H - 2, 14);

  // =============================================
  // 4. LOOPPAD LANGS DE RAND VAN HET ZWEMBAD
  // =============================================
  ctx.strokeStyle = "rgba(120,90,50,0.35)";
  ctx.lineWidth = 3;
  ctx.setLineDash([8, 6]);

  ctx.beginPath();
  ctx.moveTo(RIGHT_WALKWAY_X, TOP_WALKWAY_Y);
  ctx.lineTo(RIGHT_WALKWAY_X, BOTTOM_WALKWAY_Y);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(POOL_X, TOP_WALKWAY_Y);
  ctx.lineTo(RIGHT_WALKWAY_X, TOP_WALKWAY_Y);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(POOL_X, BOTTOM_WALKWAY_Y);
  ctx.lineTo(RIGHT_WALKWAY_X, BOTTOM_WALKWAY_Y);
  ctx.stroke();

  ctx.setLineDash([]);

  // =============================================
  // 5. PARASOLS OP HET GRAS (rechts van het dek)
  // =============================================
  drawParasol(535, 200, "#FF7043");
  drawParasol(610, 160, "#42A5F5");
  drawParasol(658, 220, "#66BB6A");
  drawParasol(542, 530, "#FFD600");
  drawParasol(630, 570, "#EC407A");

  // =============================================
  // 6. KLEEDHOKJES (boven het looppad, ingang naar het pad toe)
  // =============================================
  drawKleedhokjes(CABIN_X, CABIN_Y);

  // =============================================
  // 7. KASSA
  // =============================================
  ctx.fillStyle = "#6D4C41";
  ctx.fillRect(GATE.x - 32, GATE.y - 38, 64, 76);
  ctx.fillStyle = "#8D6E63";
  ctx.fillRect(GATE.x - 28, GATE.y - 34, 56, 68);

  // luifel
  ctx.fillStyle = "#E53935";
  for (let i = 0; i < 4; i++) {
    ctx.fillRect(GATE.x - 28 + i * 14, GATE.y - 42, 12, 10);
  }

  ctx.fillStyle = "white";
  ctx.font = "bold 9px monospace";
  ctx.textAlign = "center";
  ctx.fillText("KASSA", GATE.x, GATE.y + 4);
  ctx.fillText("€", GATE.x, GATE.y + 18);
  ctx.textAlign = "left";

  // =============================================
  // 7. GRASTOEFJES EN PLANTJES LANGS DE RAND
  // =============================================
  const tufts = [
    [20, 50], [680, 50], [20, 200], [680, 200],
    [20, 700], [680, 700], [20, 850], [680, 850],
    [350, 20], [350, 960], [150, 20], [550, 20],
    [150, 960], [550, 960],
  ];
  tufts.forEach(([tx, ty]) => drawGrassTuft(tx, ty, 14));
}

function drawPool() {
  ctx.fillStyle = "#f7f7f7";
  ctx.fillRect(
    POOL_X - 24,
    POOL_Y - 24,
    POOL_WIDTH + 48,
    POOL_HEIGHT + 48
  );

  ctx.strokeStyle = "#888";
  ctx.lineWidth = 4;
  ctx.strokeRect(
    POOL_X - 24,
    POOL_Y - 24,
    POOL_WIDTH + 48,
    POOL_HEIGHT + 48
  );

  ctx.fillStyle = "#4FC3F7";
  ctx.fillRect(POOL_X, POOL_Y, POOL_WIDTH, POOL_HEIGHT);

  ctx.strokeStyle = "rgba(255,255,255,0.28)";
  ctx.lineWidth = 1;

  for (let i = 1; i < getTotalSubLanes(); i++) {
    if (i % getSubLanesPerLane() === 0) continue;

    ctx.beginPath();
    ctx.moveTo(POOL_X + i * getSubLaneWidth(), POOL_Y);
    ctx.lineTo(POOL_X + i * getSubLaneWidth(), POOL_Y + POOL_HEIGHT);
    ctx.stroke();
  }

  ctx.strokeStyle = "white";
  ctx.lineWidth = 4;

  for (let i = 1; i < LANE_COUNT; i++) {
    ctx.beginPath();
    ctx.moveTo(POOL_X + i * LANE_WIDTH, POOL_Y);
    ctx.lineTo(POOL_X + i * LANE_WIDTH, POOL_Y + POOL_HEIGHT);
    ctx.stroke();
  }

  ctx.strokeStyle = "#0277BD";
  ctx.lineWidth = 4;
  ctx.strokeRect(POOL_X, POOL_Y, POOL_WIDTH, POOL_HEIGHT);
}

function drawLadders() {
  LADDERS.forEach(l => {

    ctx.strokeStyle = "#444";
    ctx.lineWidth = 3;

    // horizontale richting (boven/onder)
    ctx.beginPath();
    ctx.moveTo(l.x - 10, l.y);
    ctx.lineTo(l.x + 10, l.y);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(l.x - 10, l.y + 6);
    ctx.lineTo(l.x + 10, l.y + 6);
    ctx.stroke();

  });
}

function drawSingleSwimmerBlock(x, y, s, headDirection) {
  const size = SWIMMER_SIZE;

  // kopje (badmuts) — steekt uit aan de zwemrichting
  const headW = 10;
  const headH = 7;
  const headX = x + (size - headW) / 2;

  ctx.fillStyle = "black";
  if (headDirection < 0) {
    ctx.fillRect(headX, y - headH + 2, headW, headH);
  } else {
    ctx.fillRect(headX, y + size - 2, headW, headH);
  }

  // lijf
  ctx.fillStyle = (s.penaltyTimer > 0) ? "#ff9800" : s.type.color;
  ctx.fillRect(x, y, size, size);

  // zwarte sprite-rand
  ctx.strokeStyle = "black";
  ctx.lineWidth = 2;
  ctx.strokeRect(x + 1, y + 1, size - 2, size - 2);

  // streep (zwembril/muts)
  ctx.fillStyle = s.type.stripe;
  ctx.fillRect(x + 3, y + size / 2 - 2, size - 6, 4);
}

function drawElderlyGroup(s) {
  if (s.state === "goingToLadderToEnter") {
    for (let i = 0; i < s.groupSize; i++) {
      drawSingleSwimmerBlock(s.x - i * 12, s.y + i * 10, s, 1);
    }
    return;
  }

  if (s.state === "enteringByLadder") {
    for (let i = 0; i < s.groupSize; i++) {
      let alpha = i <= s.enteringMember ? 1 : 0.45;
      ctx.globalAlpha = alpha;

      const offset = i * 12;
      drawSingleSwimmerBlock(s.x, s.y + offset, s, 1);
    }

    ctx.globalAlpha = 1;
    return;
  }

  if (s.state !== "swimming") {
    drawSingleSwimmerBlock(s.x, s.y, s, 1);
    return;
  }

  const offsets = getGroupMemberOffsets(s);

  offsets.forEach(o => {
    const global = Math.round(s.globalSubLane + o.subOffset);
    const x = xForSwimmerGlobalSubLane(global);
    const y = s.y + o.y;

    drawSingleSwimmerBlock(x, y, s, s.speedY);
  });

  ctx.strokeStyle = "rgba(255,255,255,0.8)";
  ctx.lineWidth = 1;

  const leftX = xForSwimmerGlobalSubLane(Math.round(s.globalSubLane)) - 2;
  ctx.strokeRect(leftX, s.y - 28, getSubLaneWidth() * 2 + 8, 72);
}

function drawBomb(s) {
  const cx = s.x + SWIMMER_SIZE / 2;

  // splash-ringen
  if (s.state === "bombJump" || s.state === "bombFloat") {
    ctx.strokeStyle = "rgba(255,255,255,0.9)";
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.arc(cx, s.y, s.splashRadius, 0, Math.PI * 2);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(cx, s.y, s.splashRadius * 0.6, 0, Math.PI * 2);
    ctx.stroke();
  }

  // het kind
  ctx.fillStyle = s.type.color;
  const ky = (s.state === "bombApproach") ? s.y : s.y - SWIMMER_SIZE / 2;
  ctx.fillRect(s.x, ky, SWIMMER_SIZE, SWIMMER_SIZE);

  ctx.fillStyle = "white";
  ctx.fillRect(s.x + 3, ky + 5, SWIMMER_SIZE - 6, 3);
}

function drawRaft(s) {
  ctx.fillStyle = "#8D6E63";
  ctx.fillRect(s.x, s.y, RAFT_WIDTH, RAFT_HEIGHT);

  ctx.strokeStyle = "#5D4037";
  ctx.lineWidth = 2;
  ctx.strokeRect(s.x, s.y, RAFT_WIDTH, RAFT_HEIGHT);

  ctx.strokeStyle = "rgba(93,64,55,0.6)";
  ctx.lineWidth = 1;
  for (let i = 1; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(s.x + i * (RAFT_WIDTH / 4), s.y);
    ctx.lineTo(s.x + i * (RAFT_WIDTH / 4), s.y + RAFT_HEIGHT);
    ctx.stroke();
  }

  // kinderen op het vlot
  ctx.fillStyle = "#FFB74D";
  for (let i = 0; i < s.groupSize; i++) {
    ctx.fillRect(s.x + 12 + i * 22, s.y + 9, 12, 12);
  }
}

function drawSwimmer(s) {
  if (s.typeName === "bomb") {
    drawBomb(s);
    return;
  }

  if (s.typeName === "raft") {
    drawRaft(s);
    return;
  }

  if (s.typeName === "elderlyGroup") {
    drawElderlyGroup(s);
    return;
  }

  // in het kleedhokje: onzichtbaar
  if (s.state === "inCabin") return;

  // op weg naar handdoek of kleedhokje: grijs (nog in gewone kleren)
  if (
    s.state === "goingToTowelSpot" ||
    s.state === "layingTowel" ||
    s.state === "goingToCabin"
  ) {
    const sz = SWIMMER_SIZE;
    ctx.fillStyle = "#7a7a7a";
    ctx.fillRect(s.x, s.y, sz, sz);
    ctx.strokeStyle = "#444";
    ctx.lineWidth = 2;
    ctx.strokeRect(s.x + 1, s.y + 1, sz - 2, sz - 2);
    ctx.fillStyle = "#9e9e9e";
    ctx.fillRect(s.x + 3, s.y + sz / 2 - 2, sz - 6, 4);
    return;
  }

  if (
    s.state === "walkingIn" ||
    s.state === "walkingOut" ||
    s.state === "goingToLadder" ||
    s.state === "climbingOut" ||
    s.state === "waitingToJump"
  ) {
    drawSingleSwimmerBlock(s.x, s.y, s, 1);

    if (s.state === "waitingToJump") {
      ctx.strokeStyle = "white";
      ctx.strokeRect(s.x - 2, s.y - 2, SWIMMER_SIZE + 4, SWIMMER_SIZE + 4);
    }

    return;
  }

  drawSingleSwimmerBlock(s.x, s.y, s, s.speedY);

  if (s.markedForExit) {
    ctx.strokeStyle = "white";
    ctx.lineWidth = 1;
    ctx.strokeRect(s.x - 1, s.y - 1, SWIMMER_SIZE + 2, SWIMMER_SIZE + 2);
  }
}

function drawPlayer() {

  // =========================
  // DUIK ANIMATIE
  // =========================
  if (player.isDiving) {
    const progress = player.diveTimer / DIVE_DURATION;

    ctx.globalAlpha = 0.22;
    ctx.fillStyle = "#003C8F";
    ctx.fillRect(player.x + 2, player.y + 6, PLAYER_SIZE - 4, 5);

    ctx.globalAlpha = 0.6;
    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(
      player.x + PLAYER_SIZE / 2,
      player.y + PLAYER_SIZE / 2,
      12 + (1 - progress) * 8,
      4,
      0,
      0,
      Math.PI * 2
    );
    ctx.stroke();

    ctx.globalAlpha = 1;
    return;
  }

  // =========================
  // SPELER BLOK
  // =========================
  const psize = PLAYER_SIZE;

  // kopje (badmuts) steekt uit aan de zwemrichting
  if (player.swimming) {
    const headW = 10;
    const headH = 7;
    const headX = player.x + (psize - headW) / 2;

    ctx.fillStyle = "black";
    if (player.speedY < 0) {
      ctx.fillRect(headX, player.y - headH + 2, headW, headH);
    } else {
      ctx.fillRect(headX, player.y + psize - 2, headW, headH);
    }
  }

  ctx.fillStyle = player.color;
  ctx.fillRect(player.x, player.y, psize, psize);

  // ✅ gele rand zodat de speler nooit met een zwemmer te verwarren is
  ctx.strokeStyle = "#FFD400";
  ctx.lineWidth = 3;
  ctx.strokeRect(player.x + 1, player.y + 1, psize - 2, psize - 2);

  // witte streep zodat de speler altijd herkenbaar is
  ctx.fillStyle = "white";
  ctx.fillRect(player.x + 4, player.y + psize / 2 - 2, psize - 8, 4);

  if (!player.swimming) {
    ctx.fillStyle = "black";
    ctx.font = "14px monospace";
    ctx.fillText(
      "SPACE = SPRING IN HET WATER",
      POOL_X + 80,
      POOL_Y + POOL_HEIGHT + 45
    );
  }

  // =========================
  // ✅ KIES JE BAAN (nieuw!)
  // =========================
  if (!player.swimming) {
    ctx.strokeStyle = "white";
    ctx.lineWidth = 1;

    const laneX = xForGlobalSubLane(player.globalSubLane);

    ctx.strokeRect(
      laneX - 8,
      POOL_Y,
      PLAYER_SIZE + 16,
      POOL_HEIGHT
    );
  }
}

function drawHud() {
  const totalWidth = POOL_WIDTH;
  const gap = 10;

  const blockWidth = (totalWidth - 2 * gap) / 3;
  const blockHeight = 160;

  const baseX = POOL_X;
  const y = POOL_Y + POOL_HEIGHT + 60;

  const padding = 12;
  const lineHeight = 30;

  // =========================
  // BLOK 1: ZWEMBAD
  // =========================
  let x = baseX;

  ctx.fillStyle = "#222";
  ctx.fillRect(x, y, blockWidth, blockHeight);

  ctx.fillStyle = "white";

  ctx.font = "bold 14px monospace";
  ctx.fillText("ZWEMBAD", x + padding, y + padding + 8);

  ctx.font = "16px monospace";

  ctx.fillText(
    "ZWEMMERS: " + swimmers.length,
    x + padding,
    y + padding + 35
  );

  // =========================
  // BLOK 2: LEVEL INFO
  // =========================
  x = baseX + blockWidth + gap;

  ctx.fillStyle = "#222";
  ctx.fillRect(x, y, blockWidth, blockHeight);

  ctx.fillStyle = "white";

  ctx.font = "bold 14px monospace";
  ctx.fillText("LEVEL", x + padding, y + padding + 8);

  ctx.font = "16px monospace";

  let textY = y + padding + 30;

  ctx.fillText("LEVEL: " + (level === 0 ? "INTRO" : level), x + padding, textY);

  ctx.fillText("TIJD: " + timeLeft, x + padding, textY + lineHeight);

  // ✅ slash notatie
  ctx.fillText(
    "BANEN: " + lanesThisLevel + "/" + getLanesTarget(),
    x + padding,
    textY + 2 * lineHeight
  );

  // =========================
  // BLOK 3: SPELER
  // =========================
  x = baseX + 2 * (blockWidth + gap);

  ctx.fillStyle = "#222";
  ctx.fillRect(x, y, blockWidth, blockHeight);

  ctx.fillStyle = "white";

  ctx.font = "bold 14px monospace";
  ctx.fillText("SPELER", x + padding, y + padding + 8);

  ctx.font = "16px monospace";

  textY = y + padding + 30;

  ctx.fillText(
    "BOTSINGEN: " + hits,
    x + padding,
    textY
  );

  // ✅ duik-meter: blokjes tonen hoeveel duiken er over zijn
  if (player.divesLeft > 90) {
    ctx.fillText("DUIKEN: ∞", x + padding, textY + lineHeight);
  } else {
    ctx.fillText("DUIKEN:", x + padding, textY + lineHeight);

    for (let i = 0; i < MAX_DIVES_PER_LEVEL; i++) {
      ctx.fillStyle = i < player.divesLeft ? "#4FC3F7" : "#555";
      ctx.fillRect(x + padding + 78 + i * 16, textY + lineHeight - 11, 12, 12);
    }

    ctx.fillStyle = "white";
  }

  const penaltySeconds = Math.ceil(player.penaltyTimer / 60);

  ctx.fillStyle = player.penaltyTimer > 0 ? "orange" : "white";

  ctx.fillText(
    "STRAF: " + penaltySeconds,
    x + padding,
    textY + 2 * lineHeight
  );

  // Russian Ball Twist (geheim)
  ctx.fillStyle = russianBallTwistUsed ? "#555" : "#7CFC00";
  ctx.fillText(
    russianBallTwistUsed ? "★" : "★",
    x + padding,
    textY + 3 * lineHeight
  );
}



function drawIntroGraphic(typeName, cx, cy) {
  ctx.save();

  if (typeName === "boss") {
    ctx.fillStyle = "#111111";
    for (let i = 0; i < 6; i++) {
      ctx.fillRect(cx - 96 + i * 32, cy - 12, 22, 24);
    }
    ctx.restore();
    return;
  }

  if (typeName === "raft") {
    const w = 70, h = 38;
    ctx.fillStyle = "#8D6E63";
    ctx.fillRect(cx - w / 2, cy - h / 2, w, h);
    ctx.strokeStyle = "#5D4037";
    ctx.lineWidth = 2;
    ctx.strokeRect(cx - w / 2, cy - h / 2, w, h);
    ctx.fillStyle = "#FFB74D";
    ctx.fillRect(cx - 16, cy - 8, 14, 14);
    ctx.fillRect(cx + 4, cy - 8, 14, 14);
    ctx.restore();
    return;
  }

  if (typeName === "bomb") {
    ctx.strokeStyle = "rgba(255,255,255,0.9)";
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(cx, cy, 26, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, 15, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = "#FF7043";
    ctx.fillRect(cx - 9, cy - 9, 18, 18);
    ctx.restore();
    return;
  }

  const type = SWIMMER_TYPES[typeName];
  if (!type) {
    ctx.restore();
    return;
  }

  const size = 26;

  function block(bx) {
    ctx.fillStyle = "black";
    ctx.fillRect(bx + size / 2 - 4, cy - size / 2 - 6, 8, 6); // kopje
    ctx.fillStyle = type.color;
    ctx.fillRect(bx, cy - size / 2, size, size);
    ctx.fillStyle = type.stripe;
    ctx.fillRect(bx + 4, cy - 3, size - 8, 5);
  }

  if (typeName === "elderlyGroup") {
    block(cx - size - 2);
    block(cx + 2);
  } else {
    block(cx - size / 2);
  }

  ctx.restore();
}

// =====================================================
// RUSSIAN BALL TWIST — COMIC OVERLAY
// =====================================================

function drawComicFighter(x, y, color, punch, knockedOut) {
  const s = 18;

  ctx.save();
  ctx.translate(x, y);
  if (knockedOut) ctx.rotate(0.6);

  ctx.fillStyle = color;
  ctx.fillRect(-s / 2, -s / 2, s, s);
  ctx.strokeStyle = "black";
  ctx.lineWidth = 2;
  ctx.strokeRect(-s / 2, -s / 2, s, s);

  // stotende vuist
  ctx.fillStyle = "#ffcf9e";
  const fx = punch ? s / 2 + 3 : 0;
  const fy = punch ? -2 : -s / 2 - 7;
  ctx.fillRect(fx - 3, fy - 3, 7, 7);
  ctx.strokeRect(fx - 3, fy - 3, 7, 7);

  ctx.restore();

  if (knockedOut) {
    ctx.fillStyle = "#ffe23d";
    for (let i = 0; i < 3; i++) {
      const a = i * 2.1;
      const sx = x + Math.cos(a) * 15;
      const sy = y - 18 + Math.sin(a) * 6;
      ctx.fillRect(sx - 1, sy - 3, 2, 6);
      ctx.fillRect(sx - 3, sy - 1, 6, 2);
    }
  }
}

// achtergrond + schuine actielijnen van een comic-paneel
function drawComicFrame(px, py, w, h) {
  ctx.fillStyle = "#fdf5e6";
  ctx.fillRect(px, py, w, h);

  ctx.save();
  ctx.beginPath();
  ctx.rect(px, py, w, h);
  ctx.clip();
  ctx.strokeStyle = "rgba(0,0,0,0.07)";
  ctx.lineWidth = 3;
  for (let i = -h; i < w; i += 14) {
    ctx.beginPath();
    ctx.moveTo(px + i, py);
    ctx.lineTo(px + i + h, py + h);
    ctx.stroke();
  }
  ctx.restore();
}

function drawComicBorder(px, py, w, h) {
  ctx.strokeStyle = "black";
  ctx.lineWidth = 4;
  ctx.strokeRect(px, py, w, h);
}

function drawJuggleBall(bx, by, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(bx, by, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = "black";
  ctx.lineWidth = 2;
  ctx.stroke();

  // glans
  ctx.fillStyle = "rgba(255,255,255,0.75)";
  ctx.beginPath();
  ctx.arc(bx - r * 0.35, by - r * 0.35, r * 0.28, 0, Math.PI * 2);
  ctx.fill();
}

// paneel met de twee ballen (kleuren links/rechts instelbaar)
function drawBallsPanel(px, py, w, h, leftColor, rightColor) {
  drawComicFrame(px, py, w, h);

  const ballY = py + h * 0.42;
  const lx = px + w * 0.30;
  const rx = px + w * 0.70;
  const r = 21;

  // jongleer-boog
  ctx.strokeStyle = "rgba(0,0,0,0.3)";
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(lx, ballY);
  ctx.quadraticCurveTo((lx + rx) / 2, ballY - 52, rx, ballY);
  ctx.stroke();
  ctx.setLineDash([]);

  drawJuggleBall(lx, ballY, r, leftColor);
  drawJuggleBall(rx, ballY, r, rightColor);

  // twee jongleurs eronder (armen omhoog)
  const jugY = py + h - 30;
  drawComicFighter(px + w * 0.37, jugY, "#1E88E5", true, false);
  drawComicFighter(px + w * 0.63, jugY, "#333333", true, false);

  drawComicBorder(px, py, w, h);
}

// middenpaneel met grote comic-tekst "TWIST"
function drawTwistPanel(px, py, w, h) {
  drawComicFrame(px, py, w, h);

  const cx = px + w / 2;
  const cy = py + h / 2;

  ctx.save();
  ctx.translate(cx, cy);

  // grote gele starburst
  ctx.fillStyle = "#ffd400";
  ctx.strokeStyle = "black";
  ctx.lineWidth = 3;
  const spikes = 14;
  const rO = Math.min(w, h) * 0.5;
  const rI = rO * 0.62;
  ctx.beginPath();
  for (let i = 0; i < spikes * 2; i++) {
    const rr = (i % 2 === 0) ? rO : rI;
    const a = (i / (spikes * 2)) * Math.PI * 2 - Math.PI / 2;
    const bx = Math.cos(a) * rr;
    const by = Math.sin(a) * rr;
    if (i === 0) ctx.moveTo(bx, by);
    else ctx.lineTo(bx, by);
  }
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // TWIST tekst, licht gekanteld
  ctx.rotate(-0.12);
  ctx.fillStyle = "#E53935";
  ctx.strokeStyle = "white";
  ctx.lineWidth = 4;
  ctx.font = "bold 42px Impact, Arial Black, monospace";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.strokeText("TWIST", 0, 0);
  ctx.fillText("TWIST", 0, 0);

  ctx.restore();

  drawComicBorder(px, py, w, h);
}

function drawComicOverlay() {
  const cx = canvas.width / 2;

  const RED = "#E53935";
  const GREEN = "#2ecc40";

  // titel
  ctx.fillStyle = "#ffd400";
  ctx.strokeStyle = "black";
  ctx.lineWidth = 4;
  ctx.font = "bold 46px Impact, Arial Black, monospace";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.strokeText("RUSSIAN BALL TWIST", cx, 250);
  ctx.fillText("RUSSIAN BALL TWIST", cx, 250);

  // 3 comic-panelen naast elkaar
  const w = 200, h = 168, gap = 12;
  const totalW = 3 * w + 2 * gap;
  const px0 = (canvas.width - totalW) / 2;
  const py = 330;

  // 1: rood links, groen rechts
  drawBallsPanel(px0, py, w, h, RED, GREEN);
  // 2: grote "TWIST"
  drawTwistPanel(px0 + (w + gap), py, w, h);
  // 3: omgedraaid — groen links, rood rechts
  drawBallsPanel(px0 + 2 * (w + gap), py, w, h, GREEN, RED);

  // ondertitel
  ctx.fillStyle = "white";
  ctx.font = "20px monospace";
  ctx.fillText("player invokes Russian Ball Twist", cx, py + h + 44);

  ctx.textAlign = "left";
  ctx.textBaseline = "alphabetic";
}

function drawOverlay() {
  if (!overlay) return;

  const progress = overlay.timer / overlay.duration;
  const scale = 1 + (1 - progress) * 0.12;

  ctx.fillStyle = "rgba(0,0,0,0.72)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (overlay.comic) {
    drawComicOverlay();
    return;
  }

  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  const hasIntro = overlay.typeName || overlay.lines;
  const titleY = hasIntro ? cy - 120 : cy;

  // zonder type-plaatje beginnen de uitlegregels direct onder de titel
  const lineStartY = overlay.typeName ? cy + 70 : titleY + 60;

  // ✅ solide paneel achter titel + uitleg zodat de HUD-tekst er niet
  // doorheen schijnt (echte modal in plaats van los zwevende regels)
  if (hasIntro) {
    const lastLineY = overlay.lines
      ? lineStartY + (overlay.lines.length - 1) * 30
      : cy + 20;

    const panelTop = titleY - 45;
    const panelBottom = lastLineY + 35;

    ctx.fillStyle = "#0d1b2a";
    ctx.fillRect(cx - 280, panelTop, 560, panelBottom - panelTop);

    ctx.strokeStyle = "white";
    ctx.lineWidth = 3;
    ctx.strokeRect(cx - 280, panelTop, 560, panelBottom - panelTop);
  }

  // Titel
  ctx.save();
  ctx.translate(cx, titleY);
  ctx.scale(scale, scale);
  ctx.fillStyle = "white";
  ctx.font = "bold 40px monospace";
  ctx.fillText(overlay.text, 0, 0);
  ctx.restore();

  // Plaatje van het nieuwe type
  if (overlay.typeName) {
    drawIntroGraphic(overlay.typeName, cx, cy - 20);
  }

  // Uitleg-regels
  if (overlay.lines) {
    ctx.fillStyle = "white";
    ctx.font = "20px monospace";
    overlay.lines.forEach((line, i) => {
      ctx.fillText(line, cx, lineStartY + i * 30);
    });
  }

  if (!gameFinished && overlay.text.indexOf("GEHAALD") >= 0) {
    ctx.font = "18px monospace";
    ctx.fillStyle = "white";
    ctx.fillText("Volgend level start zo", cx, cy + 48);
  }

  // herstel standaard tekstuitlijning voor de rest van de tekeningen
  ctx.textAlign = "left";
  ctx.textBaseline = "alphabetic";
}

function drawFightClouds() {
  fightClouds.forEach(c => {
    const p = c.timer / c.duration;      // 1 → 0
    const grow = 1 - p;                   // 0 → 1
    const r = 11 + grow * 13;
    const alpha = Math.min(1, p / 0.35);  // op het eind uitfaden

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(c.x, c.y);

    // pluizige stofwolk
    const puffs = 8;
    for (let i = 0; i < puffs; i++) {
      const a = c.seed + (i / puffs) * Math.PI * 2;
      const px = Math.cos(a) * r * 0.6;
      const py = Math.sin(a) * r * 0.6;

      ctx.fillStyle = "#eeeeee";
      ctx.beginPath();
      ctx.arc(px, py, r * 0.55, 0, Math.PI * 2);
      ctx.fill();

      ctx.lineWidth = 2;
      ctx.strokeStyle = "rgba(110,110,110,0.7)";
      ctx.stroke();
    }

    // vuisten die uit de wolk steken
    const fistDist = r + 1;
    const fists = [c.seed + 0.6, c.seed + 2.4, c.seed + 4.3];
    fists.forEach(a => {
      const fx = Math.cos(a) * fistDist;
      const fy = Math.sin(a) * fistDist;

      ctx.fillStyle = "#ffcf9e"; // huidskleur
      ctx.fillRect(fx - 4, fy - 4, 8, 8);
      ctx.strokeStyle = "black";
      ctx.lineWidth = 1;
      ctx.strokeRect(fx - 4, fy - 4, 8, 8);
      // knokkel-streepje
      ctx.fillStyle = "rgba(0,0,0,0.4)";
      ctx.fillRect(fx - 4, fy - 1, 8, 1);
    });

    // boze gele sterretjes
    ctx.fillStyle = "#ffe23d";
    const stars = [c.seed + 1.5, c.seed + 3.5, c.seed + 5.2];
    stars.forEach((a, i) => {
      const sd = r + 7 + (i % 2) * 3;
      const sx = Math.cos(a) * sd;
      const sy = Math.sin(a) * sd;
      ctx.fillRect(sx - 1, sy - 3, 2, 6);
      ctx.fillRect(sx - 3, sy - 1, 6, 2);
    });

    ctx.restore();
  });

  ctx.globalAlpha = 1;
}

function drawTowels() {
  towels.forEach(t => {
    ctx.save();
    ctx.translate(t.x + 13, t.y + 5);
    ctx.rotate(t.angle);
    ctx.fillStyle = t.color;
    ctx.fillRect(-13, -5, 28, 10);
    ctx.fillStyle = "rgba(255,255,255,0.38)";
    for (let i = -11; i < 16; i += 5) {
      ctx.fillRect(i, -5, 2, 10);
    }
    ctx.strokeStyle = "rgba(0,0,0,0.18)";
    ctx.lineWidth = 1;
    ctx.strokeRect(-13, -5, 28, 10);
    ctx.restore();
  });
}

function drawBelowPoolDecorations() {
  // parasols op het gras rechts van het dek (onder/naast het bad)
  drawParasol(545, 680, "#FF7043");
  drawParasol(608, 740, "#42A5F5");
  drawParasol(558, 840, "#FFD600");
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawDeck();
  drawTowels();
  drawPool();
  drawBelowPoolDecorations();
  drawLadders();

  swimmers.forEach(drawSwimmer);

  drawPlayer();

  drawFightClouds();

  drawHud();

  drawOverlay();
}

// =====================================================
// LOOP
// =====================================================

// ✅ game-over is geen einde meer: je mag het level opnieuw proberen
function showGameOverOverlay(title, reason) {
  logAgentEvent("gameOver", { title });

  overlay = {
    text: title,
    lines: [reason, "", "SPATIE = probeer dit level opnieuw"],
    gameOver: true,
    timer: 999999,
    duration: 999999,
    onDone: null
  };

  gamePaused = true;
}

function retryCurrentLevel() {
  overlay = null;

  const subs = getSubLanesPerLane();
  resetForNextLevel(subs, subs);

  if (level >= MAX_LEVEL) {
    spawnBossLine();
  } else {
    populateInitialSwimmers();
  }

  logAgentEvent("retryLevel", {});
  gamePaused = false;
}

// één frame: update + teken + einde-check (zonder rAF-scheduling)
function tick() {
  update();
  draw();

  if (!(timeLeft > 0 && hits < maxHits) && !gameFinished) {
    if (hits >= maxHits && !overlay) {
      showGameOverOverlay("BADMEESTER: ERUIT!", "Te veel botsingen!");
    } else if (timeLeft <= 0 && !overlay) {
      showGameOverOverlay("ZWEMBAD DICHT!", "De tijd is om!");
    }
  }
}

function loop() {
  tick();
  if (!agentMode) {
    requestAnimationFrame(loop);
  }
}

// =====================================================
// TIMER
// =====================================================

setInterval(() => {
  if (agentMode) return; // in agent-mode telt de tijd op frames (zie __agent.step)
  if (timeLeft > 0 && hits < maxHits && !gamePaused && !gameFinished) {
    timeLeft--;
  }
}, 1000);

// =====================================================
// CONTROLS
// =====================================================

document.addEventListener("keydown", e => {
  // ✅ game-over: SPATIE/ENTER = het level opnieuw proberen
  if (overlay && overlay.gameOver && (e.code === "Space" || e.code === "Enter")) {
    retryCurrentLevel();
    e.preventDefault();
    return;
  }

  // intro/leveloverzicht overslaan met SPATIE of ENTER (maar niet de comic)
  if (overlay && overlay.onDone && !overlay.comic && !gameFinished &&
      (e.code === "Space" || e.code === "Enter")) {
    overlay.timer = 0; // dwingt onDone af in updateOverlay
    e.preventDefault();
    return;
  }

  if (gamePaused || gameFinished) return;

  // Russian Ball Twist: geheim — 3× drukken binnen 2.5 seconden
  if (e.key === "b" || e.key === "B") {
    bPressCount++;
    bPressTimer = 150;
    if (bPressCount >= 3) {
      bPressCount = 0;
      bPressTimer = 0;
      invokeRussianBallTwist();
    }
    return;
  }

  if (e.key === "ArrowLeft") {
    movePlayerHorizontal(-1);
  }

  if (e.key === "ArrowRight") {
    movePlayerHorizontal(1);
  }


  if (e.code === "Space") {
        if (!player.swimming) {
      player.swimming = true;

      // ✅ start net IN het water (geen clipping)
      player.y = POOL_Y + 2;

      player.speedY = player.cruiseSpeed;
    } else {
      startDive();
    }
  }

  // ✅ ↑/↓ passen de blijvende kruissnelheid aan (geen eenmalige duw meer)
  if (player.swimming && player.penaltyTimer === 0 && !player.isDiving) {
    if (e.key === "ArrowUp") {
      player.cruiseSpeed += 0.25;
    }

    if (e.key === "ArrowDown") {
      player.cruiseSpeed -= 0.25;
    }

    player.cruiseSpeed = clamp(player.cruiseSpeed, player.minSpeed, player.maxSpeed);
    player.speedY = (player.speedY < 0 ? -1 : 1) * player.cruiseSpeed;
  }
});

// =====================================================
// TOUCH CONTROLS (mobiel)
// =====================================================

// de knoppen vuren dezelfde keydown-events af als het toetsenbord,
// dus alle spellogica (skip, springen, duiken, retry) werkt vanzelf
const TOUCH_KEYMAP = {
  ArrowLeft:  { key: "ArrowLeft",  code: "ArrowLeft" },
  ArrowRight: { key: "ArrowRight", code: "ArrowRight" },
  ArrowUp:    { key: "ArrowUp",    code: "ArrowUp" },
  ArrowDown:  { key: "ArrowDown",  code: "ArrowDown" },
  Space:      { key: " ",          code: "Space" },
  KeyB:       { key: "b",          code: "KeyB" }
};

document.querySelectorAll("#touch-controls button").forEach(btn => {
  btn.addEventListener("pointerdown", e => {
    e.preventDefault(); // geen scroll/zoom/focus op de knop

    const m = TOUCH_KEYMAP[btn.dataset.key];
    if (!m) return;

    document.dispatchEvent(
      new KeyboardEvent("keydown", { key: m.key, code: m.code, bubbles: true })
    );
  });
});

// =====================================================
// AGENT API  (window.__agent) — voor de Claude-playtester
// =====================================================

// deterministische RNG (mulberry32) zodat runs herhaalbaar zijn
function installSeededRandom(seed) {
  let a = seed >>> 0;
  Math.random = function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

const AGENT_KEYMAP = {
  left:  { key: "ArrowLeft",  code: "ArrowLeft" },
  right: { key: "ArrowRight", code: "ArrowRight" },
  up:    { key: "ArrowUp",    code: "ArrowUp" },
  down:  { key: "ArrowDown",  code: "ArrowDown" },
  space: { key: " ",          code: "Space" },
  dive:  { key: " ",          code: "Space" },
  b:     { key: "b",          code: "KeyB" },
  enter: { key: "Enter",      code: "Enter" }
};

window.__agent = {
  enable() {
    agentMode = true;
    return true;
  },

  seed(n) {
    installSeededRandom(n);
    return true;
  },

  // volledige, gestructureerde momentopname van de spelwereld
  getState() {
    return {
      frame: agentFrameCount,
      level,
      levelLabel: level === 0 ? "INTRO" : String(level),
      lanesThisLevel,
      lanesTarget: getLanesTarget(),
      hits, maxHits, timeLeft,
      gamePaused, gameFinished,
      overlay: overlay ? { text: overlay.text, comic: !!overlay.comic } : null,
      russianBallTwistUsed,
      pool: {
        x: POOL_X, y: POOL_Y, w: POOL_WIDTH, h: POOL_HEIGHT,
        lanes: LANE_COUNT, subLanes: getSubLanesPerLane(),
        totalSubLanes: getTotalSubLanes()
      },
      player: {
        x: player.x, y: player.y,
        lane: laneFromGlobalSubLane(player.globalSubLane),
        subLane: Math.round(player.globalSubLane),
        swimming: player.swimming,
        speedY: player.speedY,
        cruiseSpeed: player.cruiseSpeed,
        isDiving: player.isDiving,
        divesLeft: player.divesLeft,
        penaltyTimer: player.penaltyTimer
      },
      swimmers: swimmers
        .filter(s => s.state === "swimming")
        .map(s => ({
          type: s.typeName,
          x: Math.round(s.x), y: Math.round(s.y),
          lane: s.lane,
          subLane: Math.round(s.globalSubLane),
          speedY: +s.speedY.toFixed(2),
          penalty: s.penaltyTimer > 0
        })),
      hazards: {
        bombs: swimmers.filter(s => s.typeName === "bomb").length,
        rafts: swimmers.filter(s => s.typeName === "raft").length
      },
      metrics: agentMetrics
    };
  },

  // stuur een toets: "left" | "right" | "up" | "down" | "space" | "dive" | "b" | "enter"
  press(action) {
    const m = AGENT_KEYMAP[action];
    if (!m) return false;
    document.dispatchEvent(new KeyboardEvent("keydown", { key: m.key, code: m.code, bubbles: true }));
    return true;
  },

  // stap n frames vooruit (tijd + populatie lopen op frames in agent-mode)
  step(n) {
    n = Math.max(1, n | 0);
    for (let i = 0; i < n; i++) {
      agentFrameCount++;
      if (!gamePaused && !gameFinished) {
        if (agentFrameCount % 60 === 0 && timeLeft > 0 && hits < maxHits) timeLeft--;
        if (agentFrameCount % 90 === 0) spawnPopulationEvent();
      }
      tick();
    }
    return this.getState();
  }
};

// START
showLevelIntro(0);
loop();
</script>
