<!DOCTYPE html>
<html>
<head>
  <title>Zwembad Game</title>
  <style>
    body {
      margin: 0;
      background: #b7e3f7;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
      margin: auto;
      background: #b7e3f7;
    }
  </style>
</head>
<body>

<canvas id="game" width="720" height="1000"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// =====================================================
// SCENE CONFIG
// =====================================================

const POOL_X = 60;
const POOL_Y = 90;
const POOL_WIDTH = 400;
const POOL_HEIGHT = 600;

const HUD_X = 500;

const LANE_COUNT = 5;
const LANE_WIDTH = 80;

const SWIMMER_SIZE = 14;
const PLAYER_SIZE = 14;

const DECK_MARGIN = 34;

const MAX_DIVES_PER_LEVEL = 3;
const DIVE_DURATION = 55;

const SWIMMER_PENALTY_DURATION = 180;
const PAIR_COLLISION_LIMIT = 1;
const PAIR_COLLISION_COOLDOWN = 50;

const LANES_PER_LEVEL = 10;
const MAX_LEVEL = 30;

const GATE = {
  x: 660,
  y: 390
};

const RIGHT_WALKWAY_X = POOL_X + POOL_WIDTH + DECK_MARGIN;
const TOP_WALKWAY_Y = POOL_Y - DECK_MARGIN;
const BOTTOM_WALKWAY_Y = POOL_Y + POOL_HEIGHT + DECK_MARGIN;

const LADDERS = [
  // BOVEN (korte zijde)
  { name: "boven links", side: "top", x: POOL_X + 20, y: POOL_Y - 8 },
  { name: "boven rechts", side: "top", x: POOL_X + POOL_WIDTH - 20, y: POOL_Y - 8 },

  // ONDER (korte zijde)
  { name: "onder links", side: "bottom", x: POOL_X + 20, y: POOL_Y + POOL_HEIGHT + 8 },
  { name: "onder rechts", side: "bottom", x: POOL_X + POOL_WIDTH - 20, y: POOL_Y + POOL_HEIGHT + 8 }
];

// =====================================================
// DYNAMIC SUBLANE CONFIG
// =====================================================

function getSubLanesPerLane() {
  return level < 10 ? 3 : 5;
}

function getSubLaneWidth() {
  return LANE_WIDTH / getSubLanesPerLane();
}

function getTotalSubLanes() {
  return LANE_COUNT * getSubLanesPerLane();
}

// =====================================================
// GAME STATE
// =====================================================

let swimmers = [];

let lanesCompleted = 0;
let lanesThisLevel = 0;

let hits = 0;
let maxHits = 5;
let timeLeft = 90;
let hitCooldown = 0;

let level = 1;

let nextSwimmerId = 1;
let pairCollisionCounts = {};
let pairCollisionCooldowns = {};

let overlay = null;
let gamePaused = false;
let gameFinished = false;

// =====================================================
// OVERLAY / LEVEL SYSTEM
// =====================================================

function showOverlay(text, durationFrames, onDone) {
  overlay = {
    text,
    timer: durationFrames,
    duration: durationFrames,
    onDone
  };
  gamePaused = true;
}

function updateOverlay() {
  if (!overlay) return;

  overlay.timer--;

  if (overlay.timer <= 0) {
    const done = overlay.onDone;
    overlay = null;

    if (done) {
      done();
    }
  }
}

function resetForNextLevel(oldSubLaneCount, newSubLaneCount) {
  lanesThisLevel = 0;
  hits = 0;
  hitCooldown = 0;
  timeLeft = 90;

  player.penaltyTimer = 0;
  player.color = "blue";
  player.divesLeft = MAX_DIVES_PER_LEVEL;
  player.isDiving = false;
  player.diveTimer = 0;

  player.globalSubLane = globalSubLaneFromLaneAndSub(
    2,
    Math.floor(getSubLanesPerLane() / 2)
  );
  player.x = xForGlobalSubLane(player.globalSubLane);

  swimmers.forEach(s => {
  s.penaltyTimer = 0;
  s.avoiding = false;
  s.stopped = false;
  s.stopTimer = 0;
  s.wantsToReturn = false;
  s.returnCooldown = 0;

  // ✅ NIEUW: reset zwemdoel
  s.lanesSwum = 0;

  const type = s.type;
  s.targetLanes =
    type.lanesMin +
    Math.floor(Math.random() * (type.lanesMax - type.lanesMin + 1));

  s.markedForExit = false;
});

  pairCollisionCounts = {};
  pairCollisionCooldowns = {};

  if (oldSubLaneCount !== newSubLaneCount) {
    populateInitialSwimmers();
  }
}

function checkLevelProgress() {
  if (gameFinished) return;
  if (overlay) return;
  if (lanesThisLevel < LANES_PER_LEVEL) return;

  const clearedLevel = level;
  const oldSubLaneCount = getSubLanesPerLane();

  showOverlay("LEVEL " + clearedLevel + " CLEARED", 150, () => {
    if (clearedLevel >= MAX_LEVEL) {
      gameFinished = true;
      overlay = {
        text: "GOED GEZWOMMEN!",
        timer: 999999,
        duration: 999999,
        onDone: null
      };
      gamePaused = true;
      return;
    }

    level++;

    const newSubLaneCount = getSubLanesPerLane();

    resetForNextLevel(oldSubLaneCount, newSubLaneCount);
    gamePaused = false;
  });
}

// =====================================================
// LEVEL CONFIG
// =====================================================

function getLevelConfig(level) {
  if (level < 10) {
    return { maxSwimmers: 30, startSwimmers: 15 };
  }

  if (level < 20) {
    return { maxSwimmers: 40, startSwimmers: 30 };
  }

  if (level < 30) {
    return { maxSwimmers: 50, startSwimmers: 45 };
  }

  return { maxSwimmers: 75, startSwimmers: 50 };
}

function getMaxSwimmers() {
  return getLevelConfig(level).maxSwimmers;
}

function getStartSwimmers() {
  return getLevelConfig(level).startSwimmers;
}

// =====================================================
// SPEED SCALE
// =====================================================

function speedFromScale(min, max) {
  const value = min + Math.random() * (max - min);
  return value * 0.08;
}

// =====================================================
// GRID HELPERS
// =====================================================

function laneFromGlobalSubLane(globalSubLane) {
  return Math.floor(Math.round(globalSubLane) / getSubLanesPerLane());
}

function subLaneInsideLane(globalSubLane) {
  return Math.round(globalSubLane) % getSubLanesPerLane();
}

function globalSubLaneFromLaneAndSub(lane, subLane) {
  return lane * getSubLanesPerLane() + subLane;
}

function xForGlobalSubLane(globalSubLane) {
  return POOL_X
    + Math.round(globalSubLane) * getSubLaneWidth()
    + getSubLaneWidth() / 2
    - PLAYER_SIZE / 2;
}

function xForSwimmerGlobalSubLane(globalSubLane) {
  return POOL_X
    + Math.round(globalSubLane) * getSubLaneWidth()
    + getSubLaneWidth() / 2
    - SWIMMER_SIZE / 2;
}

function randomGlobalSubLaneInLane(lane) {
  return globalSubLaneFromLaneAndSub(
    lane,
    Math.floor(Math.random() * getSubLanesPerLane())
  );
}

function randomElderlyStartSubLaneInLane(lane) {
  const maxStart = Math.max(0, getSubLanesPerLane() - 2);
  const sub = Math.floor(Math.random() * (maxStart + 1));
  return globalSubLaneFromLaneAndSub(lane, sub);
}

function crossesMainLaneBoundary(fromGlobalSubLane, toGlobalSubLane) {
  return laneFromGlobalSubLane(fromGlobalSubLane) !== laneFromGlobalSubLane(toGlobalSubLane);
}

// =====================================================
// PLAYER
// =====================================================

let player = {
  globalSubLane: globalSubLaneFromLaneAndSub(2, 1),

  x: xForGlobalSubLane(globalSubLaneFromLaneAndSub(2, 1)),
  y: POOL_Y - 22, // ✅ boven water (op rand)
  speedY: 0,

  baseSpeed: 2.0,
  maxSpeed: 3.0,
  minSpeed: 0.8,

  swimming: false,
  color: "blue",

  penaltyTimer: 0,
  penaltyDuration: 180,

  divesLeft: MAX_DIVES_PER_LEVEL,
  isDiving: false,
  diveTimer: 0
};

// =====================================================
// BASIC HELPERS
// =====================================================

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function randomFromArray(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

const ACTIVE_POOL_STATES = new Set([
  "swimming",
  "walkingIn",
  "waitingToJump",
  "goingToLadderToEnter",
  "enteringByLadder"
]);

function isPoolActiveSwimmer(s) {
  return ACTIVE_POOL_STATES.has(s.state);
}

function getActiveSwimmers() {
  return swimmers.filter(isPoolActiveSwimmer);
}

function getLaneSwimmers(lane) {
  return swimmers.filter(s => s.lane === lane && isPoolActiveSwimmer(s));
}

function getLaneStats(lane) {
  const laneSwimmers = getLaneSwimmers(lane);

  if (laneSwimmers.length === 0) {
    return { population: 0, avgSpeed: 0, aggression: 0 };
  }

  const sum = laneSwimmers.reduce((acc, s) => acc + Math.abs(s.normalSpeed), 0);

  return {
    population: laneSwimmers.length,
    avgSpeed: sum / laneSwimmers.length,
    aggression: laneSwimmers.filter(s => s.typeName === "unfriendlyCrawl").length
  };
}

function moveTowards(obj, targetX, targetY, speed) {
  const dx = targetX - obj.x;
  const dy = targetY - obj.y;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist <= speed || dist === 0) {
    obj.x = targetX;
    obj.y = targetY;
    return true;
  }

  obj.x += (dx / dist) * speed;
  obj.y += (dy / dist) * speed;

  return false;
}

function verticalOverlap(aY, aH, bY, bH) {
  return (
    aY < bY + bH &&
    aY + aH > bY
  );
}


function isAhead(swimmer, other) {
  if (swimmer.speedY > 0) {
    return other.y > swimmer.y;
  } else {
    return other.y < swimmer.y;
  }
}


function isApproachingHeadOn(s, o) {
  return Math.sign(s.speedY) !== Math.sign(o.speedY);
}

function shouldAvoid(s, o) {

  // =========================
  // 0. Bejaarden hebben voorrang
  // =========================

  if (o.typeName === "elderlyGroup" && s.typeName !== "elderlyGroup") {
    return true; // jij wijkt uit
  }

  if (s.typeName === "elderlyGroup" && o.typeName !== "elderlyGroup") {
    return false; // bejaarde blijft
  }

  // =========================
  // 1. Zelfde zwemrichting
  // =========================
  if (Math.sign(s.speedY) === Math.sign(o.speedY)) {
    // s zit achter o → s moet uitwijken
    return isAhead(s, o);
  }

  // =========================
  // 2. Tegengestelde richting (frontaal)
  // BEIDE zwemmers wijken uit — niet alleen de lagere ID
  // =========================
  return true;
}



function forwardDistance(swimmer, other) {
  return Math.abs(other.y - swimmer.y);
}

function pairKey(a, b) {
  const first = Math.min(a.id, b.id);
  const second = Math.max(a.id, b.id);
  return first + "-" + second;
}

// =====================================================
// LOGICAL COLLISION / OCCUPANCY
// =====================================================

function getGroupMemberOffsets(s) {
  const forward = s.speedY >= 0 ? 1 : -1;

  if (s.groupSize === 2) {
    return [
      { subOffset: 0, y: 0 },
      { subOffset: 1, y: 0 }
    ];
  }

  return [
    { subOffset: 0, y: 0 },
    { subOffset: 1, y: 0 },
    { subOffset: 0, y: -forward * 24 }
  ];
}

function getLogicalSwimmerParts(s) {
  if (s.typeName !== "elderlyGroup") {
    return [
      {
        globalSubLane: Math.round(s.globalSubLane),
        y: s.y,
        h: SWIMMER_SIZE
      }
    ];
  }

  if (s.state !== "swimming") {
    return [
      {
        globalSubLane: Math.round(s.globalSubLane),
        y: s.y,
        h: SWIMMER_SIZE
      }
    ];
  }

  const offsets = getGroupMemberOffsets(s);

  return offsets.map(o => {
    return {
      globalSubLane: Math.round(s.globalSubLane + o.subOffset),
      y: s.y + o.y,
      h: SWIMMER_SIZE
    };
  });
}

function swimmersShareLogicalSubLane(a, b) {
  const aParts = getLogicalSwimmerParts(a);
  const bParts = getLogicalSwimmerParts(b);

  for (const ap of aParts) {
    for (const bp of bParts) {
      if (ap.globalSubLane === bp.globalSubLane) {
        return true;
      }
    }
  }

  return false;
}

function swimmersCollideLogical(a, b) {
  const aParts = getLogicalSwimmerParts(a);
  const bParts = getLogicalSwimmerParts(b);

  for (const ap of aParts) {
    for (const bp of bParts) {
      if (ap.globalSubLane !== bp.globalSubLane) continue;

      if (verticalOverlap(ap.y, ap.h, bp.y, bp.h)) {
        return true;
      }
    }
  }

  return false;
}

function playerCollidesWithSwimmerLogical(player, swimmer) {
  const playerSubLane = Math.round(player.globalSubLane);
  const parts = getLogicalSwimmerParts(swimmer);

  for (const part of parts) {
    if (part.globalSubLane !== playerSubLane) continue;

    if (verticalOverlap(player.y, PLAYER_SIZE, part.y, part.h)) {
      return true;
    }
  }

  return false;
}

function chooseAdjacentGlobalSubLane(s) {
  const options = [];

  const currentSubLane = Math.round(s.globalSubLane);
  const inside = subLaneInsideLane(currentSubLane);
  const lane = s.lane;

  if (inside > 0) {
    options.push(globalSubLaneFromLaneAndSub(lane, inside - 1));
  }

  if (inside < getSubLanesPerLane() - 1) {
    options.push(globalSubLaneFromLaneAndSub(lane, inside + 1));
  }

  if (options.length === 0) return currentSubLane;

  return randomFromArray(options);
}

// =====================================================
// SMART SUBLANE SELECTION AFTER REPEATED COLLISIONS
// =====================================================

function countSwimmersInGlobalSubLane(globalSubLane, ignoreSwimmer) {
  let count = 0;

  swimmers.forEach(s => {
    if (s === ignoreSwimmer) return;
    if (s.state !== "swimming") return;

    const parts = getLogicalSwimmerParts(s);

    parts.forEach(part => {
      if (part.globalSubLane === globalSubLane) {
        count++;
      }
    });
  });

  return count;
}

function chooseLeastCrowdedSubLaneForSwimmer(s) {
  const lane = s.lane;

  if (s.typeName === "elderlyGroup") {
    const candidates = [];

    for (let sub = 0; sub < getSubLanesPerLane() - 1; sub++) {
      const g1 = globalSubLaneFromLaneAndSub(lane, sub);
      const g2 = globalSubLaneFromLaneAndSub(lane, sub + 1);

      candidates.push({
        globalSubLane: g1,
        count: countSwimmersInGlobalSubLane(g1, s) + countSwimmersInGlobalSubLane(g2, s)
      });
    }

    candidates.sort((a, b) => {
      if (a.count !== b.count) return a.count - b.count;
      return Math.random() - 0.5;
    });

    return candidates[0].globalSubLane;
  }

  const candidates = [];

  for (let sub = 0; sub < getSubLanesPerLane(); sub++) {
    const g = globalSubLaneFromLaneAndSub(lane, sub);

    candidates.push({
      globalSubLane: g,
      count: countSwimmersInGlobalSubLane(g, s)
    });
  }

  candidates.sort((a, b) => {
    if (a.count !== b.count) return a.count - b.count;
    return Math.random() - 0.5;
  });

  return candidates[0].globalSubLane;
}

function chooseSwimmerToMoveAfterRepeatedCollision(a, b) {
  if (a.typeName === "elderlyGroup" && b.typeName !== "elderlyGroup") return b;
  if (b.typeName === "elderlyGroup" && a.typeName !== "elderlyGroup") return a;

  if (a.typeName === "unfriendlyCrawl" && b.typeName !== "unfriendlyCrawl") return b;
  if (b.typeName === "unfriendlyCrawl" && a.typeName !== "unfriendlyCrawl") return a;

  return Math.random() < 0.5 ? a : b;
}

function forceSwimmerToLeastCrowdedSubLane(s) {
  const newGlobalSubLane = chooseLeastCrowdedSubLaneForSwimmer(s);

  s.targetGlobalSubLane = newGlobalSubLane;
  s.originalGlobalSubLane = newGlobalSubLane;

  if (s.typeName === "elderlyGroup") {
    s.globalSubLane = newGlobalSubLane;
    s.x = xForSwimmerGlobalSubLane(s.globalSubLane);
  } else {
    s.avoiding = true;
    s.avoidTimer = 140;
    s.returnToLane = false;
  }
}

// =====================================================
// DIVE LOGIC
// =====================================================

function startDive() {
  if (!player.swimming) return;
  if (player.isDiving) return;
  if (player.divesLeft <= 0) return;
  if (player.penaltyTimer > 0) return;

  player.isDiving = true;
  player.diveTimer = DIVE_DURATION;
  player.divesLeft--;
}

function updateDive() {
  if (!player.isDiving) return;

  player.diveTimer--;

  if (player.diveTimer <= 0) {
    player.isDiving = false;
  }
}

// =====================================================
// PENALTIES
// =====================================================

function applyPlayerPenalty(pushBack) {
  if (hitCooldown > 0) return;

  hits++;
  hitCooldown = 35;

  player.penaltyTimer = player.penaltyDuration;

  if (player.speedY > 0) {
    player.speedY = player.minSpeed;
  } else {
    player.speedY = -player.minSpeed;
  }

  player.color = "orange";

  if (pushBack) {
    if (player.speedY < 0) {
      player.y += 10;
    } else {
      player.y -= 10;
    }

    player.y = clamp(player.y, POOL_Y, POOL_Y + POOL_HEIGHT - PLAYER_SIZE);
  }
}

function applySwimmerPenalty(s) {
  if (s.penaltyTimer > 0) return;

  s.penaltyTimer = SWIMMER_PENALTY_DURATION;

  const direction = s.speedY >= 0 ? 1 : -1;
  const slowSpeed = Math.max(0.18, Math.abs(s.normalSpeed) * 0.25);

  s.speedY = direction * slowSpeed;
}

// =====================================================
// PLAYER HORIZONTAL MOVEMENT
// =====================================================

function movePlayerHorizontal(direction) {

  const newSubLane = player.globalSubLane + direction;

  if (newSubLane < 0 || newSubLane >= getTotalSubLanes()) {
    return;
  }

  // ✅ op rand mag je vrij wisselen
  if (!player.swimming) {
    player.globalSubLane = newSubLane;
    player.x = xForGlobalSubLane(player.globalSubLane);
    return;
  }

  // oude gedrag blijft voor in het water
  const crossesLine = crossesMainLaneBoundary(player.globalSubLane, newSubLane);

  if (crossesLine && !player.isDiving) {
    applyPlayerPenalty(false);
    return;
  }

  player.globalSubLane = newSubLane;
  player.x = xForGlobalSubLane(player.globalSubLane);
}



// =====================================================
// LANE SELECTION
// =====================================================

function lanePopulation(lane) {
  return getLaneStats(lane).population;
}

function laneAverageSpeed(lane) {
  return getLaneStats(lane).avgSpeed;
}

function laneAggression(lane) {
  return getLaneStats(lane).aggression;
}

function chooseCalmestLane() {
  const candidates = [];

  for (let lane = 0; lane < LANE_COUNT; lane++) {
    const stats = getLaneStats(lane);

    candidates.push({
      lane,
      count: stats.population,
      avgSpeed: stats.avgSpeed,
      aggression: stats.aggression
    });
  }

  candidates.sort((a, b) => {
    if (a.count !== b.count) return a.count - b.count;
    if (Math.abs(a.avgSpeed - b.avgSpeed) > 0.001) return a.avgSpeed - b.avgSpeed;
    if (a.aggression !== b.aggression) return a.aggression - b.aggression;
    return Math.random() - 0.5;
  });

  return candidates[0].lane;
}

// =====================================================
// PATHS
// =====================================================

function buildEntryPath(entryX, entryY) {
  return [
    { x: RIGHT_WALKWAY_X, y: GATE.y },
    { x: RIGHT_WALKWAY_X, y: entryY },
    { x: entryX, y: entryY }
  ];
}

function buildExitPath(fromX, fromY) {
  return [
    { x: RIGHT_WALKWAY_X, y: fromY },
    { x: RIGHT_WALKWAY_X, y: GATE.y },
    { x: GATE.x, y: GATE.y }
  ];
}

function updatePathFollower(s) {
  if (!s.path || s.path.length === 0) return true;

  const target = s.path[0];
  const arrived = moveTowards(s, target.x, target.y, s.walkSpeed);

  if (arrived) {
    s.path.shift();
  }

  return s.path.length === 0;
}

function chooseEntryLadderForLane(lane) {
  const wantRight = lane >= Math.floor(LANE_COUNT / 2);
  const rightLadders = LADDERS.filter(l => l.side === "right");
  const leftLadders = LADDERS.filter(l => l.side === "left");

  return wantRight ? randomFromArray(rightLadders) : randomFromArray(leftLadders);
}

function buildElderlyEntryPath(ladder) {
  const path = [];

  path.push({ x: RIGHT_WALKWAY_X, y: GATE.y });
  path.push({ x: RIGHT_WALKWAY_X, y: ladder.y });

  if (ladder.side === "right") {
    path.push({ x: POOL_X + POOL_WIDTH + DECK_MARGIN, y: ladder.y });
  } else {
    path.push({ x: POOL_X - DECK_MARGIN, y: ladder.y });
  }

  return path;
}

// =====================================================
// SWIMMER TYPES
// =====================================================

function chooseBestAvoidanceTarget(s, o) {
  const lane = s.lane;
  const currentSub = subLaneInsideLane(Math.round(s.globalSubLane));
  const numSubs = getSubLanesPerLane();
  const headOn = o ? isApproachingHeadOn(s, o) : false;

  // For elderly groups, need 2 adjacent free sub-lanes
  if (s.typeName === "elderlyGroup") {
    const candidates = [];
    for (let sub = 0; sub < numSubs - 1; sub++) {
      const g1 = globalSubLaneFromLaneAndSub(lane, sub);
      const g2 = globalSubLaneFromLaneAndSub(lane, sub + 1);
      candidates.push({
        globalSubLane: g1,
        count: countSwimmersInGlobalSubLane(g1, s) + countSwimmersInGlobalSubLane(g2, s)
      });
    }
    candidates.sort((a, b) => a.count - b.count || Math.random() - 0.5);
    return candidates[0].globalSubLane;
  }

  // Build candidate sub-lanes with scores
  const options = [];
  for (let sub = 0; sub < numSubs; sub++) {
    if (sub === currentSub) continue;
    const g = globalSubLaneFromLaneAndSub(lane, sub);
    const count = countSwimmersInGlobalSubLane(g, s);
    const dist = Math.abs(sub - currentSub);

    // For head-on: use ID parity to send swimmers to opposite sides
    // Even ID prefers lower sub-lane, odd ID prefers higher
    let preferenceBonus = 0;
    if (headOn) {
      const prefersLeft = (s.id % 2 === 0);
      if (prefersLeft && sub < currentSub) preferenceBonus = -1;
      if (!prefersLeft && sub > currentSub) preferenceBonus = -1;
    }

    options.push({ globalSubLane: g, score: count * 3 + dist + preferenceBonus });
  }

  if (options.length === 0) return Math.round(s.globalSubLane);

  options.sort((a, b) => a.score - b.score);
  return options[0].globalSubLane;
}

// Keep old name as alias for elder-specific call sites
function chooseWideAvoidance(s, o) {
  return chooseBestAvoidanceTarget(s, o);
}

const SWIMMER_TYPES = {

  ordinary: {
    label: "Gewone zwemmer",
    color: "#35C759",
    stripe: "white",
    speedMin: 10,
    speedMax: 25,
    lanesMin: 20,
    lanesMax: 30,

    behavior: function(s, others) {
      others.forEach(o => {
        if (o === s) return;
        if (o.state !== "swimming") return;
        if (!shouldAvoid(s, o)) return;

        const headOn = isApproachingHeadOn(s, o);
        const subLaneDiff = Math.abs(Math.round(s.globalSubLane) - Math.round(o.globalSubLane));

        // Detect head-on from further away, also from adjacent sub-lanes
        const laterallyClose = headOn ? subLaneDiff <= 1 : swimmersShareLogicalSubLane(s, o);
        if (!laterallyClose) return;

        const distance = forwardDistance(s, o);
        const detectionRange = headOn ? 130 : 95;

        if (distance < detectionRange && distance > 12 && !s.avoiding) {
          s.avoiding = true;
          s.avoidTimer = headOn ? 110 : 85;
          s.targetGlobalSubLane = chooseBestAvoidanceTarget(s, o);
          // Don't snap back to original lane after head-on — causes oscillation
          s.returnToLane = !headOn;
        }
      });
    }
  },

  slower: {
    label: "Iets langzamere zwemmer",
    color: "#1976D2",
    stripe: "white",
    speedMin: 5,
    speedMax: 15,
    lanesMin: 20,
    lanesMax: 30,

    behavior: function(s, others) {
      others.forEach(o => {
        if (o === s) return;
        if (o.state !== "swimming") return;
        if (!shouldAvoid(s, o)) return;

        const headOn = isApproachingHeadOn(s, o);
        const subLaneDiff = Math.abs(Math.round(s.globalSubLane) - Math.round(o.globalSubLane));
        const laterallyClose = headOn ? subLaneDiff <= 1 : swimmersShareLogicalSubLane(s, o);
        if (!laterallyClose) return;

        const distance = forwardDistance(s, o);
        const detectionRange = headOn ? 110 : 60;

        if (distance < detectionRange && distance > 10 && !s.avoiding && !s.stopped) {
          if (!headOn) {
            s.stopped = true;
            s.stopTimer = 20;
          }

          s.avoiding = true;
          s.avoidTimer = headOn ? 120 : 130;
          s.targetGlobalSubLane = chooseBestAvoidanceTarget(s, o);
          s.returnToLane = !headOn;
        }
      });
    }
  },

  friendlyCrawl: {
    label: "Vriendelijke borstcrawl",
    color: "#00BCD4",
    stripe: "black",
    speedMin: 15,
    speedMax: 25,
    lanesMin: 30,
    lanesMax: 40,

    behavior: function(s, others) {
      others.forEach(o => {
        if (o === s) return;
        if (o.state !== "swimming") return;
        if (!shouldAvoid(s, o)) return;

        const headOn = isApproachingHeadOn(s, o);
        const subLaneDiff = Math.abs(Math.round(s.globalSubLane) - Math.round(o.globalSubLane));
        const laterallyClose = headOn ? subLaneDiff <= 1 : swimmersShareLogicalSubLane(s, o);
        if (!laterallyClose) return;

        const distance = forwardDistance(s, o);
        const detectionRange = headOn ? 150 : 110;

        if (distance < detectionRange && distance > 15 && !s.avoiding) {
          s.avoiding = true;
          s.avoidTimer = headOn ? 130 : 125;
          s.targetGlobalSubLane = chooseBestAvoidanceTarget(s, o);
          s.returnToLane = !headOn && Math.random() < 0.5;
        }
      });
    }
  },

  unfriendlyCrawl: {
    label: "Niet-vriendelijke borstcrawl",
    color: "#111111",
    stripe: "white",
    speedMin: 25,
    speedMax: 30,
    lanesMin: 40,
    lanesMax: 50,

    behavior: function(s, others) {
      // Botst liever, maar wijkt minimaal uit voor frontale botsingen
      others.forEach(o => {
        if (o === s) return;
        if (o.state !== "swimming") return;
        if (!isApproachingHeadOn(s, o)) return;

        const subLaneDiff = Math.abs(Math.round(s.globalSubLane) - Math.round(o.globalSubLane));
        if (subLaneDiff > 0) return; // alleen als direct frontaal

        const distance = forwardDistance(s, o);

        if (distance < 50 && distance > 8 && !s.avoiding) {
          s.avoiding = true;
          s.avoidTimer = 70;
          s.targetGlobalSubLane = chooseBestAvoidanceTarget(s, o);
          s.returnToLane = false;
        }

    label: "Bejaarden",
    color: "#B06AD9",
    stripe: "white",
    speedMin: 3,

    }

// =====================================================
// TYPE AVAILABILITY
// =====================================================

function getAvailableSwimmerTypes() {
  if (level < 4) {
    return [
      "ordinary",
      "ordinary",
      "ordinary",
      "ordinary",
      "ordinary",
      "ordinary",
      "slower",
      "elderlyGroup"
    ];
  }

  if (level < 8) {
    return [
      "ordinary",
      "ordinary",
      "ordinary",
      "slower",
      "slower",
      "elderlyGroup"
    ];
  }

  if (level < 15) {
    return [
      "ordinary",
      "ordinary",
      "slower",
      "friendlyCrawl",
      "friendlyCrawl",
      "elderlyGroup"
    ];
  }

  return [
    "ordinary",
    "slower",
    "friendlyCrawl",
    "friendlyCrawl",
    "unfriendlyCrawl",
    "elderlyGroup"
  ];
}

// =====================================================
// CREATE SWIMMER
// =====================================================

function countElderly() {
  return swimmers.filter(s => s.typeName === "elderlyGroup").length;
}

function laneHasElderly(lane) {
  return swimmers.some(s =>
    s.typeName === "elderlyGroup" &&
    s.lane === lane &&
    s.state !== "walkingOut"
  );
}

function createSwimmer(randomPosition) {
  let typeNames = getAvailableSwimmerTypes();

  // ✅ Level 1-9: max 5 bejaarden
  if (level < 10 && countElderly() >= 5) {
   typeNames = typeNames.filter(t => t !== "elderlyGroup");
  }

  const typeName = randomFromArray(typeNames);
  const type = SWIMMER_TYPES[typeName];

  let lane;

  if (typeName === "elderlyGroup" && level < 10) {

    // ✅ alleen lanes zonder bejaarden
    const freeLanes = [];

    for (let i = 0; i < LANE_COUNT; i++) {
      if (!laneHasElderly(i)) {
        freeLanes.push(i);
      }
    }

    // fallback (zou zelden gebeuren)
    if (freeLanes.length > 0) {
      lane = randomFromArray(freeLanes);
    } else {
      lane = Math.floor(Math.random() * LANE_COUNT);
    }

  } else {
    lane = randomPosition
      ? Math.floor(Math.random() * LANE_COUNT)
      : chooseCalmestLane();
  }

  let globalSubLane;

  if (typeName === "elderlyGroup") {
    globalSubLane = randomElderlyStartSubLaneInLane(lane);
  } else {
    globalSubLane = randomGlobalSubLaneInLane(lane);
  }

  const baseX = xForSwimmerGlobalSubLane(globalSubLane);

  const fromTop = Math.random() < 0.5;
  const direction = fromTop ? 1 : -1;

  const speed = speedFromScale(type.speedMin, type.speedMax);

  const targetLanes =
    type.lanesMin + Math.floor(Math.random() * (type.lanesMax - type.lanesMin + 1));

  let x;
  let y;
  let state;
  let path = [];

  const entryDeckY = fromTop ? TOP_WALKWAY_Y : BOTTOM_WALKWAY_Y;
  const jumpX = baseX;
  const jumpY = entryDeckY;

  let entryLadder = null;
  let groupSize = 1;
  let enteringMember = 0;
  let enterTimer = 0;

  if (typeName === "elderlyGroup") {
    groupSize = Math.random() < 0.65 ? 2 : 3;
    entryLadder = chooseEntryLadderForLane(lane);

    if (randomPosition) {
      x = baseX;
      y = POOL_Y + Math.random() * (POOL_HEIGHT - SWIMMER_SIZE);
      state = "swimming";
    } else {
      x = GATE.x;
      y = GATE.y;
      state = "goingToLadderToEnter";
      path = buildElderlyEntryPath(entryLadder);
    }
  } else {
    if (randomPosition) {
      x = baseX;
      y = POOL_Y + Math.random() * (POOL_HEIGHT - SWIMMER_SIZE);
      state = "swimming";
    } else {
      x = GATE.x;
      y = GATE.y;
      state = "walkingIn";
      path = buildEntryPath(jumpX, jumpY);
    }
  }

  return {
    id: nextSwimmerId++,

    typeName,
    type,

    state,

    lane,
    globalSubLane,
    originalGlobalSubLane: globalSubLane,
    targetGlobalSubLane: globalSubLane,

    baseX,
    x,
    y,

    jumpX,
    jumpY,
    fromTop,

    path,

    speedY: speed * direction,
    normalSpeed: speed,
    walkSpeed: typeName === "elderlyGroup" ? 0.85 : 1.5,

    avoiding: false,
    avoidTimer: 0,
    returnToLane: true,
    wantsToReturn: false,
    returnCooldown: 0,

    stopped: false,
    stopTimer: 0,

    lanesSwum: 0,
    targetLanes,

    markedForExit: false,
    exitLadder: null,
    removeMe: false,

    groupSize,
    entryLadder,
    enteringMember,
    enterTimer,

    penaltyTimer: 0
  };
}

// =====================================================
// INITIAL POPULATION
// =====================================================

function populateInitialSwimmers() {
  swimmers = [];

  const count = getStartSwimmers();

  for (let i = 0; i < count; i++) {
    swimmers.push(createSwimmer(true));
  }
}

populateInitialSwimmers();

// =====================================================
// POPULATION SYSTEM
// =====================================================

function getOccupiedSubLanes() {
  const occupied = new Set();

  swimmers.forEach(s => {
    if (s.state !== "swimming") return;

    const parts = getLogicalSwimmerParts(s);
    parts.forEach(p => {
      occupied.add(p.globalSubLane);
    });
  });

  return occupied.size;
}

function spawnPopulationEvent() {

  if (gameFinished) return;

  const max = getMaxSwimmers();

  // tel actieve zwemmers (niet degene die al weggaan)
  const activeCount = swimmers.filter(s =>
    s.state !== "walkingOut"
  ).length;

  // =========================
  // ✅ GROEIFASE (onder max)
  // =========================
  if (activeCount < max) {

    // ✅ altijd minstens 1 spawn
    swimmers.push(createSwimmer(false));

    // ✅ extra spawn als het nog leeg is (sneller opbouwen)
    if (activeCount < max * 0.5) {
      swimmers.push(createSwimmer(false));
    }

    // ✅ kleine kans op extra variatie
    if (Math.random() < 0.3) {
      swimmers.push(createSwimmer(false));
    }
  }

  // =========================
  // ✅ STABILISATIE (op max)
  // =========================
  else {

    const candidates = swimmers.filter(
      s => s.state === "swimming" && !s.markedForExit
    );

    if (candidates.length > Math.max(5, getStartSwimmers())) {

      // ✅ kies iemand om rustig te laten vertrekken
      const chosen = randomFromArray(candidates);
      chosen.markedForExit = true;
    }
  }
}

function scheduleNextPopulationEvent() {
  const delay = 5000 + Math.random() * 5000;

  setTimeout(() => {
    if (!gameFinished) {
      spawnPopulationEvent();
      scheduleNextPopulationEvent();
    }
  }, delay);
}

scheduleNextPopulationEvent();

// =====================================================
// PLAYER UPDATE
// =====================================================

function updatePlayer() {
  player.x = xForGlobalSubLane(player.globalSubLane);

  // ✅ STAAT OP RAND → nog niet zwemmen
  if (!player.swimming) {
    player.y = POOL_Y - 22; // blijft op rand
    return;
  }

  updateDive();

  if (player.penaltyTimer > 0) {
    player.penaltyTimer--;
  }

  player.y += player.speedY;

  if (player.y < POOL_Y) {
    player.y = POOL_Y;

    player.speedY = Math.abs(player.baseSpeed);

    lanesCompleted++;
    lanesThisLevel++;
    checkLevelProgress();
  }

  if (player.y > POOL_Y + POOL_HEIGHT - PLAYER_SIZE) {
    player.y = POOL_Y + POOL_HEIGHT - PLAYER_SIZE;

    player.speedY = -Math.abs(player.baseSpeed);

    lanesCompleted++;
    lanesThisLevel++;
    checkLevelProgress();
  }

  if (player.penaltyTimer > 0) {
    player.color = "orange";
  } else if (player.color === "orange") {
    player.color = "blue";
  }
}

// =====================================================
// ENTRY / EXIT LOGIC
// =====================================================

function updateWalkingIn(s) {
  const arrived = updatePathFollower(s);

  if (arrived) {
    s.state = "waitingToJump";
    s.jumpTimer = 18;
  }
}

function updateWaitingToJump(s) {
  s.jumpTimer--;

  if (s.jumpTimer <= 0) {
    s.state = "swimming";
    s.x = xForSwimmerGlobalSubLane(s.globalSubLane);

    if (s.fromTop) {
      s.y = POOL_Y;
      s.speedY = Math.abs(s.normalSpeed);
    } else {
      s.y = POOL_Y + POOL_HEIGHT - SWIMMER_SIZE;
      s.speedY = -Math.abs(s.normalSpeed);
    }
  }
}

function updateGoingToLadderToEnter(s) {
  const arrived = updatePathFollower(s);

  if (arrived) {
    s.state = "enteringByLadder";
    s.enterTimer = 45;
    s.enteringMember = 0;
  }
}

function updateEnteringByLadder(s) {
  s.enterTimer--;

  if (s.entryLadder.side === "left") {
    s.x = POOL_X - 12;
  } else {
    s.x = POOL_X + POOL_WIDTH - 8;
  }

  s.y = s.entryLadder.y + s.enteringMember * 10;

  if (s.enterTimer <= 0) {
    s.enteringMember++;

    if (s.enteringMember >= s.groupSize) {
      s.state = "swimming";
      s.x = xForSwimmerGlobalSubLane(s.globalSubLane);
      s.y = s.entryLadder.y;

      if (s.entryLadder.y < POOL_Y + POOL_HEIGHT / 2) {
        s.speedY = Math.abs(s.normalSpeed);
      } else {
        s.speedY = -Math.abs(s.normalSpeed);
      }
    } else {
      s.enterTimer = 45;
    }
  }
}

function nearestLadder(s) {
  let best = LADDERS[0];
  let bestDistance = Infinity;

  LADDERS.forEach(l => {
    const dx = l.x - s.x;
    const dy = l.y - s.y;
    const d = Math.sqrt(dx * dx + dy * dy);

    if (d < bestDistance) {
      best = l;
      bestDistance = d;
    }
  });

  return best;
}

function startExit(s) {
  s.exitLadder = nearestLadder(s);
  s.state = "goingToLadder";
  s.targetGlobalSubLane = s.globalSubLane;
}

function updateGoingToLadder(s) {
  const ladderWaterX =
    s.exitLadder.side === "left"
      ? POOL_X
      : POOL_X + POOL_WIDTH - SWIMMER_SIZE;

  const ladderWaterY = s.exitLadder.y;

  const arrived = moveTowards(s, ladderWaterX, ladderWaterY, 1.2);

  if (arrived) {
    s.state = "climbingOut";
    s.climbTimer = 24;
  }
}

function updateClimbingOut(s) {
  s.climbTimer--;

  if (s.climbTimer <= 0) {
    if (s.exitLadder.side === "left") {
      s.x = POOL_X - DECK_MARGIN;
    } else {
      s.x = POOL_X + POOL_WIDTH + DECK_MARGIN;
    }

    s.y = s.exitLadder.y;
    s.path = buildExitPath(s.x, s.y);
    s.state = "walkingOut";
  }
}

function updateWalkingOut(s) {
  const arrived = updatePathFollower(s);

  if (arrived) {
    s.removeMe = true;
  }
}

// =====================================================
// SWIMMER UPDATE
// =====================================================

function updateSwimmerBehavior() {
  const activeSwimmers = getActiveSwimmers();

  activeSwimmers.forEach(s => {
    s.type.behavior(s, activeSwimmers);

    // Tick down return-to-lane cooldown
    if (s.returnCooldown > 0) s.returnCooldown--;

    if (s.avoiding) {
      s.avoidTimer--;

      if (s.avoidTimer <= 0) {
        s.avoiding = false;

        if (s.returnToLane) {
          // Only queue a return — we'll check below if it's actually safe
          s.wantsToReturn = true;
        }
      }
    }

    // Return to original lane only when it's free and cooldown is done
    if (!s.avoiding && s.wantsToReturn && s.typeName !== "elderlyGroup") {
      if ((s.returnCooldown || 0) <= 0) {
        const occupancy = countSwimmersInGlobalSubLane(s.originalGlobalSubLane, s);
        if (occupancy === 0) {
          s.targetGlobalSubLane = s.originalGlobalSubLane;
          s.wantsToReturn = false;
          s.returnCooldown = 45; // short cooldown after returning
        }
        // If original lane still busy, stay put and try again next frame
      }
    }
  });
}

function updateSwimmerSpeedPenalty(s) {
  if (s.penaltyTimer > 0) {
    s.penaltyTimer--;

    const direction = s.speedY >= 0 ? 1 : -1;
    const targetSpeed = Math.abs(s.normalSpeed);
    let currentSpeed = Math.abs(s.speedY);

    currentSpeed += 0.012;
    currentSpeed = Math.min(currentSpeed, targetSpeed);

    s.speedY = direction * currentSpeed;
  }
}

function updateSwimmerMovement() {
  swimmers.forEach(s => {

    if (s.state === "goingToLadderToEnter") {
      updateGoingToLadderToEnter(s);
      return;
    }

    if (s.state === "enteringByLadder") {
      updateEnteringByLadder(s);
      return;
    }

    if (s.state === "walkingIn") {
      updateWalkingIn(s);
      return;
    }

    if (s.state === "waitingToJump") {
      updateWaitingToJump(s);
      return;
    }

    if (s.state === "goingToLadder") {
      updateGoingToLadder(s);
      return;
    }

    if (s.state === "climbingOut") {
      updateClimbingOut(s);
      return;
    }

    if (s.state === "walkingOut") {
      updateWalkingOut(s);
      return;
    }

    if (s.state !== "swimming") return;

    updateSwimmerSpeedPenalty(s);

    if (s.stopped) {
      s.stopTimer--;

      if (s.stopTimer <= 0) {
        s.stopped = false;
      }
    } else {
      s.y += s.speedY;
    }

    if (s.y < POOL_Y) {
      s.y = POOL_Y;

      if (s.markedForExit || s.lanesSwum >= s.targetLanes) {
        startExit(s);
        return;
      }

      s.speedY = Math.abs(s.speedY);
      s.lanesSwum++;
    }

    if (s.y > POOL_Y + POOL_HEIGHT - SWIMMER_SIZE) {
      s.y = POOL_Y + POOL_HEIGHT - SWIMMER_SIZE;

      if (s.markedForExit || s.lanesSwum >= s.targetLanes) {
        startExit(s);
        return;
      }

      s.speedY = -Math.abs(s.speedY);
      s.lanesSwum++;
    }

    if (s.typeName !== "elderlyGroup") {
      s.globalSubLane += (s.targetGlobalSubLane - s.globalSubLane) * 0.15;

      const minGlobal = globalSubLaneFromLaneAndSub(s.lane, 0);
      const maxGlobal = globalSubLaneFromLaneAndSub(s.lane, getSubLanesPerLane() - 1);

      s.globalSubLane = clamp(s.globalSubLane, minGlobal, maxGlobal);
      s.x = xForSwimmerGlobalSubLane(s.globalSubLane);
    } else {
      const minGlobal = globalSubLaneFromLaneAndSub(s.lane, 0);
      const maxGlobal = globalSubLaneFromLaneAndSub(s.lane, getSubLanesPerLane() - 2);

      s.globalSubLane = clamp(s.globalSubLane, minGlobal, maxGlobal);
      s.x = xForSwimmerGlobalSubLane(s.globalSubLane);
    }
  });

  swimmers = swimmers.filter(s => !s.removeMe);
}

function updateSwimmers() {
  updateSwimmerBehavior();
  updateSwimmerMovement();
}

// =====================================================
// SWIMMER COLLISIONS
// =====================================================

function updatePairCollisionCooldowns() {
  Object.keys(pairCollisionCooldowns).forEach(key => {
    pairCollisionCooldowns[key]--;

    if (pairCollisionCooldowns[key] <= 0) {
      delete pairCollisionCooldowns[key];
    }
  });
}

function updateSwimmerCollisions() {
  updatePairCollisionCooldowns();

  const activeSwimmers = getActiveSwimmers();

  for (let i = 0; i < activeSwimmers.length; i++) {
    const a = activeSwimmers[i];

    for (let j = i + 1; j < activeSwimmers.length; j++) {
      const b = activeSwimmers[j];

      if (!swimmersCollideLogical(a, b)) continue;

      const key = pairKey(a, b);

      applySwimmerPenalty(a);
      applySwimmerPenalty(b);

      if (!pairCollisionCooldowns[key]) {
        pairCollisionCounts[key] = (pairCollisionCounts[key] || 0) + 1;
        pairCollisionCooldowns[key] = PAIR_COLLISION_COOLDOWN;

        if (pairCollisionCounts[key] > PAIR_COLLISION_LIMIT) {
          const swimmerToMove = chooseSwimmerToMoveAfterRepeatedCollision(a, b);
          forceSwimmerToLeastCrowdedSubLane(swimmerToMove);

          pairCollisionCounts[key] = 0;
          pairCollisionCooldowns[key] = PAIR_COLLISION_COOLDOWN;
        }
      }

      if (a.y < b.y) {
        a.y -= 3;
        b.y += 3;
      } else {
        a.y += 3;
        b.y -= 3;
      }

      a.y = clamp(a.y, POOL_Y, POOL_Y + POOL_HEIGHT - SWIMMER_SIZE);
      b.y = clamp(b.y, POOL_Y, POOL_Y + POOL_HEIGHT - SWIMMER_SIZE);
    }
  }
}

// =====================================================
// PLAYER COLLISIONS
// =====================================================


function updatePlayerCollisions() {
  if (!player.swimming) return;

  if (hitCooldown > 0) hitCooldown--;

  if (player.isDiving) return;

  swimmers.forEach(s => {
    if (s.state !== "swimming") return;

    if (playerCollidesWithSwimmerLogical(player, s)) {
      applyPlayerPenalty(true);
    }
  });
}

// =====================================================
// MAIN UPDATE
// =====================================================

function update() {
  updateOverlay();

  if (gamePaused || gameFinished) {
    return;
  }

  updatePlayer();
  updateSwimmers();
  updateSwimmerCollisions();
  updatePlayerCollisions();
}

// =====================================================
// DRAWING
// =====================================================

function drawDeck() {
  ctx.fillStyle = "#e8d4a2";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = "#d2bd86";
  ctx.lineWidth = 1;

  for (let y = 0; y < canvas.height; y += 28) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }

  ctx.fillStyle = "#8D6E63";
  ctx.fillRect(GATE.x - 30, GATE.y - 35, 60, 70);

  ctx.fillStyle = "white";
  ctx.font = "12px monospace";
  ctx.fillText("KASSA", GATE.x - 20, GATE.y + 4);

  ctx.strokeStyle = "rgba(120,90,50,0.35)";
  ctx.lineWidth = 3;

  ctx.beginPath();
  ctx.moveTo(RIGHT_WALKWAY_X, TOP_WALKWAY_Y);
  ctx.lineTo(RIGHT_WALKWAY_X, BOTTOM_WALKWAY_Y);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(POOL_X, TOP_WALKWAY_Y);
  ctx.lineTo(RIGHT_WALKWAY_X, TOP_WALKWAY_Y);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(POOL_X, BOTTOM_WALKWAY_Y);
  ctx.lineTo(RIGHT_WALKWAY_X, BOTTOM_WALKWAY_Y);
  ctx.stroke();
}

function drawPool() {
  ctx.fillStyle = "#f7f7f7";
  ctx.fillRect(
    POOL_X - 24,
    POOL_Y - 24,
    POOL_WIDTH + 48,
    POOL_HEIGHT + 48
  );

  ctx.strokeStyle = "#888";
  ctx.lineWidth = 4;
  ctx.strokeRect(
    POOL_X - 24,
    POOL_Y - 24,
    POOL_WIDTH + 48,
    POOL_HEIGHT + 48
  );

  ctx.fillStyle = "#4FC3F7";
  ctx.fillRect(POOL_X, POOL_Y, POOL_WIDTH, POOL_HEIGHT);

  ctx.strokeStyle = "rgba(255,255,255,0.28)";
  ctx.lineWidth = 1;

  for (let i = 1; i < getTotalSubLanes(); i++) {
    if (i % getSubLanesPerLane() === 0) continue;

    ctx.beginPath();
    ctx.moveTo(POOL_X + i * getSubLaneWidth(), POOL_Y);
    ctx.lineTo(POOL_X + i * getSubLaneWidth(), POOL_Y + POOL_HEIGHT);
    ctx.stroke();
  }

  ctx.strokeStyle = "white";
  ctx.lineWidth = 4;

  for (let i = 1; i < LANE_COUNT; i++) {
    ctx.beginPath();
    ctx.moveTo(POOL_X + i * LANE_WIDTH, POOL_Y);
    ctx.lineTo(POOL_X + i * LANE_WIDTH, POOL_Y + POOL_HEIGHT);
    ctx.stroke();
  }

  ctx.strokeStyle = "#0277BD";
  ctx.lineWidth = 4;
  ctx.strokeRect(POOL_X, POOL_Y, POOL_WIDTH, POOL_HEIGHT);
}

function drawLadders() {
  LADDERS.forEach(l => {

    ctx.strokeStyle = "#444";
    ctx.lineWidth = 3;

    // horizontale richting (boven/onder)
    ctx.beginPath();
    ctx.moveTo(l.x - 10, l.y);
    ctx.lineTo(l.x + 10, l.y);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(l.x - 10, l.y + 6);
    ctx.lineTo(l.x + 10, l.y + 6);
    ctx.stroke();

  });
}

function drawSingleSwimmerBlock(x, y, s, headDirection) {
  if (s.penaltyTimer > 0) {
    ctx.fillStyle = "#ff9800";
  } else {
    ctx.fillStyle = s.type.color;
  }

  ctx.fillRect(x, y, SWIMMER_SIZE, SWIMMER_SIZE);

  ctx.fillStyle = "black";

  if (headDirection < 0) {
    ctx.fillRect(x + 4, y - 4, 6, 4);
  } else {
    ctx.fillRect(x + 4, y + SWIMMER_SIZE, 6, 4);
  }

  ctx.fillStyle = s.type.stripe;
  ctx.fillRect(x + 2, y + 6, 10, 3);
}

function drawElderlyGroup(s) {
  if (s.state === "goingToLadderToEnter") {
    for (let i = 0; i < s.groupSize; i++) {
      drawSingleSwimmerBlock(s.x - i * 12, s.y + i * 10, s, 1);
    }
    return;
  }

  if (s.state === "enteringByLadder") {
    for (let i = 0; i < s.groupSize; i++) {
      let alpha = i <= s.enteringMember ? 1 : 0.45;
      ctx.globalAlpha = alpha;

      const offset = i * 12;
      drawSingleSwimmerBlock(s.x, s.y + offset, s, 1);
    }

    ctx.globalAlpha = 1;
    return;
  }

  if (s.state !== "swimming") {
    drawSingleSwimmerBlock(s.x, s.y, s, 1);
    return;
  }

  const offsets = getGroupMemberOffsets(s);

  offsets.forEach(o => {
    const global = Math.round(s.globalSubLane + o.subOffset);
    const x = xForSwimmerGlobalSubLane(global);
    const y = s.y + o.y;

    drawSingleSwimmerBlock(x, y, s, s.speedY);
  });

  ctx.strokeStyle = "rgba(255,255,255,0.8)";
  ctx.lineWidth = 1;

  const leftX = xForSwimmerGlobalSubLane(Math.round(s.globalSubLane)) - 2;
  ctx.strokeRect(leftX, s.y - 28, getSubLaneWidth() * 2 + 8, 72);
}

function drawSwimmer(s) {
  if (s.typeName === "elderlyGroup") {
    drawElderlyGroup(s);
    return;
  }

  if (
    s.state === "walkingIn" ||
    s.state === "walkingOut" ||
    s.state === "goingToLadder" ||
    s.state === "climbingOut" ||
    s.state === "waitingToJump"
  ) {
    drawSingleSwimmerBlock(s.x, s.y, s, 1);

    if (s.state === "waitingToJump") {
      ctx.strokeStyle = "white";
      ctx.strokeRect(s.x - 2, s.y - 2, SWIMMER_SIZE + 4, SWIMMER_SIZE + 4);
    }

    return;
  }

  drawSingleSwimmerBlock(s.x, s.y, s, s.speedY);

  if (s.markedForExit) {
    ctx.strokeStyle = "white";
    ctx.lineWidth = 1;
    ctx.strokeRect(s.x - 1, s.y - 1, SWIMMER_SIZE + 2, SWIMMER_SIZE + 2);
  }
}

function drawPlayer() {

  // =========================
  // DUIK ANIMATIE
  // =========================
  if (player.isDiving) {
    const progress = player.diveTimer / DIVE_DURATION;

    ctx.globalAlpha = 0.22;
    ctx.fillStyle = "#003C8F";
    ctx.fillRect(player.x + 2, player.y + 6, PLAYER_SIZE - 4, 5);

    ctx.globalAlpha = 0.6;
    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(
      player.x + PLAYER_SIZE / 2,
      player.y + PLAYER_SIZE / 2,
      12 + (1 - progress) * 8,
      4,
      0,
      0,
      Math.PI * 2
    );
    ctx.stroke();

    ctx.globalAlpha = 1;
    return;
  }

  // =========================
  // SPELER BLOK
  // =========================
  ctx.fillStyle = player.color;
  ctx.fillRect(player.x, player.y, PLAYER_SIZE, PLAYER_SIZE);

  // =========================
  // RICHTING / KOPJE
  // =========================
  ctx.fillStyle = "white";

  if (player.swimming) {
    if (player.speedY < 0) {
      ctx.fillRect(player.x + 4, player.y - 4, 6, 4);
    } else {
      ctx.fillRect(player.x + 4, player.y + PLAYER_SIZE, 6, 4);
    }
  } else {
    ctx.fillStyle = "black";
    ctx.font = "14px monospace";
    ctx.fillText(
      "SPACE = SPRING IN HET WATER",
      POOL_X + 80,
      POOL_Y + POOL_HEIGHT + 45
    );
  }

  // =========================
  // ✅ KIES JE BAAN (nieuw!)
  // =========================
  if (!player.swimming) {
    ctx.strokeStyle = "white";
    ctx.lineWidth = 1;

    const laneX = xForGlobalSubLane(player.globalSubLane);

    ctx.strokeRect(
      laneX - 8,
      POOL_Y,
      PLAYER_SIZE + 16,
      POOL_HEIGHT
    );
  }
}

function drawHud() {
  const totalWidth = POOL_WIDTH;
  const gap = 10;

  const blockWidth = (totalWidth - 2 * gap) / 3;
  const blockHeight = 160;

  const baseX = POOL_X;
  const y = POOL_Y + POOL_HEIGHT + 60;

  const padding = 12;
  const lineHeight = 30;

  // =========================
  // BLOK 1: ZWEMBAD
  // =========================
  let x = baseX;

  ctx.fillStyle = "#222";
  ctx.fillRect(x, y, blockWidth, blockHeight);

  ctx.fillStyle = "white";

  ctx.font = "bold 14px monospace";
  ctx.fillText("ZWEMBAD", x + padding, y + padding + 8);

  ctx.font = "16px monospace";

  ctx.fillText(
    "ZWEMMERS: " + swimmers.length,
    x + padding,
    y + padding + 35
  );

  // =========================
  // BLOK 2: LEVEL INFO
  // =========================
  x = baseX + blockWidth + gap;

  ctx.fillStyle = "#222";
  ctx.fillRect(x, y, blockWidth, blockHeight);

  ctx.fillStyle = "white";

  ctx.font = "bold 14px monospace";
  ctx.fillText("LEVEL", x + padding, y + padding + 8);

  ctx.font = "16px monospace";

  let textY = y + padding + 30;

  ctx.fillText("LEVEL: " + level, x + padding, textY);

  ctx.fillText("TIJD: " + timeLeft, x + padding, textY + lineHeight);

  // ✅ slash notatie
  ctx.fillText(
    "BANEN: " + lanesThisLevel + "/" + LANES_PER_LEVEL,
    x + padding,
    textY + 2 * lineHeight
  );

  // =========================
  // BLOK 3: SPELER
  // =========================
  x = baseX + 2 * (blockWidth + gap);

  ctx.fillStyle = "#222";
  ctx.fillRect(x, y, blockWidth, blockHeight);

  ctx.fillStyle = "white";

  ctx.font = "bold 14px monospace";
  ctx.fillText("SPELER", x + padding, y + padding + 8);

  ctx.font = "16px monospace";

  textY = y + padding + 30;

  ctx.fillText(
    "BOTSINGEN: " + hits,
    x + padding,
    textY
  );

  ctx.fillText(
    "DUIKEN: " + player.divesLeft,
    x + padding,
    textY + lineHeight
  );

  const penaltySeconds = Math.ceil(player.penaltyTimer / 60);

  ctx.fillStyle = player.penaltyTimer > 0 ? "orange" : "white";

  ctx.fillText(
    "STRAF: " + penaltySeconds,
    x + padding,
    textY + 2 * lineHeight
  );
}


function drawLegend() {
  ctx.font = "11px monospace";

  ctx.fillStyle = "#35C759";
  ctx.fillText("GROEN gewone zwemmer", HUD_X + 5, 525);

  ctx.fillStyle = "#1976D2";
  ctx.fillText("BLAUW langzamer", HUD_X + 5, 545);

  ctx.fillStyle = "#00BCD4";
  ctx.fillText("CYAN vriendelijke crawl", HUD_X + 5, 565);

  ctx.fillStyle = "#111111";
  ctx.fillText("ZWART onvriendelijke crawl", HUD_X + 5, 585);

  ctx.fillStyle = "#B06AD9";
  ctx.fillText("PAARS bejaarden, 2 vakken", HUD_X + 5, 605);

  ctx.fillStyle = "#ff9800";
  ctx.fillText("ORANJE = zwemmer-boete", HUD_X + 5, 625);

  ctx.fillStyle = "white";
  ctx.fillText("Level 1-9: 3 subbanen", HUD_X + 5, 655);
  ctx.fillText("Vanaf level 10: 5 subbanen", HUD_X + 5, 675);
  ctx.fillText("SPACE zwemmen = duik", HUD_X + 5, 695);
}

function drawOverlay() {
  if (!overlay) return;

  const progress = overlay.timer / overlay.duration;
  const scale = 1 + (1 - progress) * 0.12;

  ctx.fillStyle = "rgba(0,0,0,0.68)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.translate(canvas.width / 2, canvas.height / 2);
  ctx.scale(scale, scale);

  ctx.fillStyle = "white";
  ctx.font = "bold 42px monospace";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(overlay.text, 0, 0);

  if (!gameFinished && overlay.text.indexOf("CLEARED") >= 0) {
    ctx.font = "18px monospace";
    ctx.fillText("Volgend level start zo", 0, 48);
  }

  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawDeck();
  drawPool();
  drawLadders();

  swimmers.forEach(drawSwimmer);

  drawPlayer();

  drawHud();
  drawLegend();

  drawOverlay();
}

// =====================================================
// LOOP
// =====================================================

function loop() {
  update();
  draw();

  if (timeLeft > 0 && hits < maxHits && !gameFinished) {
    requestAnimationFrame(loop);
  } else {
    if (gameFinished) {
      requestAnimationFrame(loop);
      return;
    }

    if (hits >= maxHits && !overlay) {
      showOverlay("BADMEESTER: ERUIT!", 300, () => {
        gameFinished = true;
      });
      requestAnimationFrame(loop);
      return;
    }

    if (timeLeft <= 0 && !overlay) {
      showOverlay("ZWEMBAD DICHT!", 300, () => {
        gameFinished = true;
      });
      requestAnimationFrame(loop);
      return;
    }

    requestAnimationFrame(loop);
  }
}

// =====================================================
// TIMER
// =====================================================

setInterval(() => {
  if (timeLeft > 0 && hits < maxHits && !gamePaused && !gameFinished) {
    timeLeft--;
  }
}, 1000);

// =====================================================
// CONTROLS
// =====================================================

document.addEventListener("keydown", e => {
  if (gamePaused || gameFinished) return;

  if (e.key === "ArrowLeft") {
    movePlayerHorizontal(-1);
  }

  if (e.key === "ArrowRight") {
    movePlayerHorizontal(1);
  }


  if (e.code === "Space") {
        if (!player.swimming) {
      player.swimming = true;

      // ✅ start net IN het water (geen clipping)
      player.y = POOL_Y + 2;

      player.speedY = player.baseSpeed;
    } else {
      startDive();
    }
  }

  if (player.swimming && player.penaltyTimer === 0 && !player.isDiving) {
    if (e.key === "ArrowUp") {
      if (player.speedY < 0) {
        player.speedY -= 0.25;
      } else {
        player.speedY += 0.25;
      }
    }

    if (e.key === "ArrowDown") {
      if (player.speedY < 0) {
        player.speedY += 0.25;
      } else {
        player.speedY -= 0.25;
      }
    }

    if (Math.abs(player.speedY) < player.minSpeed) {
      player.speedY = player.speedY < 0 ? -player.minSpeed : player.minSpeed;
    }

    player.speedY = clamp(player.speedY, -player.maxSpeed, player.maxSpeed);
  }
});

// START
loop();
</script>
